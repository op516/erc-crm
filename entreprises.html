<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entreprises — ERC CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <style>
    /* ── Toolbar spécifique ── */
    .toolbar { padding: 12px 24px; }
    .toolbar h1 { font-size: 18px; font-weight: 600; flex: 1; }

    /* ── Boutons spécifiques entreprises ── */
    .btn { height: 36px; padding: 0 16px; border-radius: 6px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: background 0.15s; }
    .btn-ghost { background: transparent; border: 1px solid #dde1ec; color: #555; }
    .btn-ghost:hover { background: #f5f6fa; }

    /* ── Toggle vue ── */
    .view-toggle { display: flex; border: 1px solid #dde1ec; border-radius: 6px; overflow: hidden; }
    .view-btn { height: 36px; width: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: white; border: none; color: #9ba3b8; transition: background 0.15s, color 0.15s; }
    .view-btn.active { background: #172b4d; color: white; }
    .view-btn:hover:not(.active) { background: #f5f6fa; }

    /* ── Content ── */
    .content { padding: 24px; }
    .count-label { font-size: 13px; color: #9ba3b8; margin-bottom: 14px; }

    /* ── Table ── */
    .table-wrap { background: white; border-radius: 8px; border: 1px solid #e8eaf0; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8f9fc; border-bottom: 1px solid #e8eaf0; }
    th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 700; color: #6b7494; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f0f2f7; cursor: pointer; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8f9fc; }
    td { padding: 12px 16px; color: #1a1a2e; font-size: 14px; }
    td.nom { font-weight: 500; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 60px 24px; color: #9ba3b8; }
    .empty-state p { margin-top: 10px; font-size: 13px; }

    /* ── Cards ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: white; border-radius: 8px; border: 1px solid #e8eaf0; padding: 20px; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #c5cce0; }
    .card-nom { font-weight: 600; font-size: 15px; color: #1a1a2e; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: #6b7494; margin-bottom: 14px; }
    .card-meta { display: flex; gap: 20px; font-size: 11px; color: #9ba3b8; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 14px; }
    .card-meta span strong { color: #1a1a2e; font-weight: 600; display: block; font-size: 13px; text-transform: none; letter-spacing: 0; margin-top: 2px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #f0f2f7; }

    /* ── Badges entreprises ── */
    .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .badge-prospect { background: #e8f0fe; color: #1967d2; }
    .badge-actif    { background: #e6f4ea; color: #137333; }
    .badge-inactif  { background: #f1f3f4; color: #6b7494; }
    .badge-cible    { background: #fce8e6; color: #c5221f; }
    .badge-mandat   { background: #fef7e0; color: #b06000; }
    .badge-flag     { background: #e6f4ea; color: #137333; }

    /* ── Overlay ── */
    .overlay { position: fixed; inset: 0; background: rgba(10,20,40,0.4); z-index: 100; display: none; }
    .overlay.open { display: block; }

    /* ── Slide-over entreprise ── */
    .slideover { position: fixed; top: 0; right: 0; bottom: 0; width: 440px; background: white; z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; box-shadow: -4px 0 24px rgba(0,0,0,0.12); }
    .slideover.open { transform: translateX(0); }
    .slideover-header { padding: 20px 24px; border-bottom: 1px solid #e8eaf0; display: flex; align-items: flex-start; gap: 12px; }
    .slideover-title { flex: 1; }
    .slideover-title h2 { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
    .btn-close { background: none; border: none; cursor: pointer; color: #9ba3b8; font-size: 20px; line-height: 1; padding: 2px; }
    .btn-close:hover { color: #1a1a2e; }
    .slideover-body { flex: 1; overflow-y: auto; padding: 24px; }

    .detail-section { margin-bottom: 24px; }
    .detail-section h3 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: #9ba3b8; margin-bottom: 10px; }
    .detail-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #f5f6fa; font-size: 13px; gap: 12px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #6b7494; flex: 0 0 140px; }
    .detail-value { color: #1a1a2e; font-weight: 500; text-align: right; flex: 1; word-break: break-word; }
    .detail-value a { color: #0e3d5c; text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }

    .contact-card { border: 1px solid #e8eaf0; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
    .contact-card-nom { font-weight: 500; font-size: 13px; color: #1a1a2e; }
    .contact-card-fonction { font-size: 12px; color: #6b7494; margin: 2px 0 8px; }
    .contact-card-links { display: flex; gap: 14px; font-size: 12px; color: #6b7494; flex-wrap: wrap; }
    .contact-card-links a { color: #0e3d5c; text-decoration: none; }

    /* ── Modal ── */
    .modal-wrap { position: fixed; inset: 0; background: rgba(10,20,40,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
    .modal-wrap.open { display: flex; }
    .modal { background: white; border-radius: 10px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid #e8eaf0; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 16px; font-weight: 600; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #e8eaf0; display: flex; justify-content: flex-end; gap: 8px; }

    /* ── Form modal ── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-row.full { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 12px; font-weight: 600; color: #6b7494; }
    .form-group label .req { color: #0052cc; margin-left: 2px; }
    .form-control { height: 36px; border: 1px solid #dde1ec; border-radius: 6px; padding: 0 12px; font-family: inherit; font-size: 14px; color: #1a1a2e; outline: none; transition: border-color 0.15s; background: white; }
    .form-control:focus { border-color: #0052cc; }
    textarea.form-control { height: auto; padding: 8px 12px; resize: vertical; min-height: 72px; }

    /* ── Toast override position ── */
    .toast { bottom: 24px; left: auto; right: 24px; transform: translateY(80px); }
    .toast.show { transform: translateY(0); }

    .loader { text-align: center; padding: 60px; color: #9ba3b8; font-size: 13px; }
    .flags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <h1>ERC CRM</h1>
    <nav class="topbar-nav">
  <a href="index.html">Accueil</a>
  <a href="contacts.html" >Contacts</a>
  <a href="entreprises.html" class="active">Entreprises</a>
  <a href="deals.html">Deals</a>
  <a href="activites.html">Activités</a>
  <a href="produits.html">Produits</a>
</nav>
  </div>
  <button class="btn-primary" onclick="openModal()">+ Ajouter</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <h1>Entreprises</h1>
  <input type="text" class="search-input" id="searchInput" placeholder="Rechercher nom, ville, secteur…" />
  <div class="view-toggle">
    <button class="view-btn active" id="btnTable" onclick="setView('table')" title="Vue liste">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="11" width="14" height="2" rx="1" fill="currentColor"/></svg>
    </button>
    <button class="view-btn" id="btnCards" onclick="setView('cards')" title="Vue cards">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor"/></svg>
    </button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="count-label" id="countLabel"></div>
  <div id="viewContainer"><div class="loader">Chargement…</div></div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSlideOver()"></div>

<!-- SLIDE-OVER -->
<div class="slideover" id="slideover">
  <div class="slideover-header">
    <div class="slideover-title">
      <h2 id="soNom">—</h2>
      <span id="soBadge"></span>
    </div>
    <button id="soActBtn" onclick="openEntActModal()" style="display:none;height:30px;padding:0 10px;background:#f0f5ff;border:1px solid #c5d8fc;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#0052cc;cursor:pointer;flex-shrink:0">+ Activité</button>
    <button class="btn-close" onclick="closeSlideOver()">✕</button>
  </div>
  <div class="slideover-body" id="slideoverBody">
    <div class="loader">Chargement…</div>
  </div>
</div>

<!-- MODAL AJOUTER -->
<div class="modal-wrap" id="modalWrap">
  <div class="modal">
    <div class="modal-header">
      <h2>Nouvelle entreprise</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label>Nom <span class="req">*</span></label><input type="text" class="form-control" id="fNom" placeholder="Raison sociale" /></div>
        <div class="form-group"><label>Sigle</label><input type="text" class="form-control" id="fSigle" placeholder="Ex: SAS, SARL…" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Secteur d'activité</label><input type="text" class="form-control" id="fSecteur" placeholder="Ex: Industrie, Commerce…" /></div>
        <div class="form-group"><label>Ville</label><input type="text" class="form-control" id="fVille" placeholder="Ex: Nantes" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>CA annuel (€)</label><input type="number" class="form-control" id="fCa" placeholder="Ex: 2500000" min="0" /></div>
        <div class="form-group"><label>Effectif</label><input type="number" class="form-control" id="fEffectif" placeholder="Nombre de salariés" min="0" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Statut</label>
          <select class="form-control" id="fStatut">
            <option value="prospect">Prospect</option><option value="cible">Cible</option>
            <option value="mandat">Mandat</option><option value="actif">Actif</option><option value="inactif">Inactif</option>
          </select>
        </div>
        <div class="form-group"><label>Département</label><input type="text" class="form-control" id="fDept" placeholder="Ex: 44" /></div>
      </div>
      <div class="form-row full">
        <div class="form-group"><label>Commentaire</label><textarea class="form-control" id="fCommentaire" placeholder="Notes libres…"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveEntreprise()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL CRÉER ACTIVITÉ -->
<div class="overlay" id="na-overlay" onclick="closeEntActModal()" style="z-index:210"></div>
<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:440px;max-width:95vw;background:#fff;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.2);z-index:211;display:none;flex-direction:column" id="na-modal">
  <div style="padding:16px 20px;border-bottom:1px solid #e8eaf0;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:15px;font-weight:600">Nouvelle activité</span>
    <button class="btn-close" onclick="closeEntActModal()">×</button>
  </div>
  <div style="padding:18px 20px">
    <div id="na-ent-label" style="background:#f0f5ff;border:1px solid #c5d8fc;border-radius:6px;padding:7px 12px;font-size:12px;color:#0052cc;font-weight:600;margin-bottom:12px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="form-group"><label>Type *</label>
        <select class="form-control" id="na-type"><option value="">— Choisir —</option><option value="appel">📞 Appel</option><option value="rdv">🤝 RDV</option><option value="email">✉️ Email</option><option value="tache">✅ Tâche</option><option value="autre">Autre</option></select>
      </div>
      <div class="form-group"><label>Date *</label><input type="date" class="form-control" id="na-date"></div>
    </div>
    <div class="form-group" style="margin-bottom:10px"><label>Sujet</label><input type="text" class="form-control" id="na-sujet" placeholder="Ex : Appel de suivi"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div class="form-group"><label>Heure</label><input type="time" class="form-control" id="na-heure"></div>
      <div class="form-group"><label>Deal associé</label><select class="form-control" id="na-deal"><option value="">— Aucun —</option></select></div>
    </div>
    <div class="form-group"><label>Note</label><textarea class="form-control" id="na-note" style="min-height:60px" placeholder="Contexte…"></textarea></div>
  </div>
  <div style="padding:12px 20px;border-top:1px solid #e8eaf0;display:flex;justify-content:flex-end;gap:8px">
    <button class="btn btn-ghost" onclick="closeEntActModal()">Annuler</button>
    <button class="btn-primary" onclick="saveEntActModal()">Créer</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const db = window.supabase;
  let allData = [], currentView = 'table', currentEntId = null;

  document.addEventListener('DOMContentLoaded', () => {
    loadEntreprises();
    document.getElementById('searchInput').addEventListener('input', renderCurrent);
  });

  async function loadEntreprises() {
    const { data, error } = await db.from('entreprises')
      .select('id, nom, sigle, ville, secteur_activite, ca_annuel, nb_employes, statut, departement')
      .order('nom');
    if (error) { showToast('Erreur chargement : ' + error.message, 'error'); document.getElementById('viewContainer').innerHTML = '<div class="empty-state"><p>Impossible de charger les données.</p></div>'; return; }
    allData = data || [];
    renderCurrent();
  }

  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!q) return allData;
    return allData.filter(e =>
      (e.nom || '').toLowerCase().includes(q) ||
      (e.ville || '').toLowerCase().includes(q) ||
      (e.secteur_activite || '').toLowerCase().includes(q)
    );
  }

  function renderCurrent() {
    const data = getFiltered(), n = data.length, total = allData.length;
    document.getElementById('countLabel').textContent = total !== n
      ? `${n} entreprise${n > 1 ? 's' : ''} (filtrées sur ${total})`
      : `${n} entreprise${n > 1 ? 's' : ''}`;
    currentView === 'table' ? renderTable(data) : renderCards(data);
  }

  function renderTable(data) {
    const container = document.getElementById('viewContainer');
    if (!data.length) { container.innerHTML = '<div class="empty-state"><p>Aucune entreprise trouvée</p></div>'; return; }
    container.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Nom</th><th>Ville</th><th>Secteur</th><th>CA annuel</th><th>Effectif</th><th>Statut</th></tr></thead>
      <tbody>${data.map(e => `<tr onclick="openSlideOver('${e.id}')">
        <td class="nom">${esc(e.nom)}${e.sigle ? `<span style="color:#9ba3b8;font-weight:400;font-size:12px;margin-left:6px">${esc(e.sigle)}</span>` : ''}</td>
        <td>${esc(e.ville) || '<span style="color:#c5cce0">—</span>'}</td>
        <td>${esc(e.secteur_activite) || '<span style="color:#c5cce0">—</span>'}</td>
        <td>${e.ca_annuel != null ? formatCA(e.ca_annuel) : '<span style="color:#c5cce0">—</span>'}</td>
        <td>${e.nb_employes != null ? e.nb_employes : '<span style="color:#c5cce0">—</span>'}</td>
        <td>${badge(e.statut)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  function renderCards(data) {
    const container = document.getElementById('viewContainer');
    if (!data.length) { container.innerHTML = '<div class="empty-state"><p>Aucune entreprise trouvée</p></div>'; return; }
    container.innerHTML = `<div class="cards-grid">${data.map(e => `
      <div class="card" onclick="openSlideOver('${e.id}')">
        <div class="card-nom">${esc(e.nom)}</div>
        <div class="card-sub">${[e.secteur_activite, e.ville].filter(Boolean).map(esc).join(' · ') || '—'}</div>
        <div class="card-meta">
          <span>CA<strong>${e.ca_annuel != null ? formatCA(e.ca_annuel) : '—'}</strong></span>
          <span>Effectif<strong>${e.nb_employes != null ? e.nb_employes + ' p.' : '—'}</strong></span>
        </div>
        <div class="card-footer">${badge(e.statut)}<span style="font-size:11px;color:#9ba3b8">${esc(e.departement) || ''}</span></div>
      </div>`).join('')}</div>`;
  }

  function setView(v) {
    currentView = v;
    document.getElementById('btnTable').classList.toggle('active', v === 'table');
    document.getElementById('btnCards').classList.toggle('active', v === 'cards');
    renderCurrent();
  }

  async function openSlideOver(id) {
    currentEntId = id;
    document.getElementById('overlay').classList.add('open');
    document.getElementById('slideover').classList.add('open');
    document.getElementById('slideoverBody').innerHTML = '<div class="loader">Chargement…</div>';
    document.getElementById('soNom').textContent = '…';
    document.getElementById('soBadge').innerHTML = '';
    document.getElementById('soActBtn').style.display = 'none';
    const { data: e, error } = await db.from('entreprises').select('*').eq('id', id).single();
    if (error || !e) { document.getElementById('slideoverBody').innerHTML = '<p style="color:#c5221f;padding:24px;font-size:13px">Erreur de chargement.</p>'; return; }
    document.getElementById('soNom').textContent = e.nom;
    document.getElementById('soBadge').innerHTML = badge(e.statut);
    document.getElementById('soActBtn').style.display = 'inline-block';
    const { data: contacts } = await db.from('contacts').select('id, prenom, nom, fonction, email_travail, tel_mobile').eq('entreprise_id', id).order('nom');
    document.getElementById('slideoverBody').innerHTML = buildSlideOverHTML(e, contacts || []);
  }

  function buildSlideOverHTML(e, contacts) {
    const row = (label, val, href) => {
      if (val === null || val === undefined || val === '') return '';
      const display = href ? `<a href="${href}" target="_blank" rel="noopener">${esc(String(val))}</a>` : esc(String(val));
      return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${display}</span></div>`;
    };
    const infos = [row('Sigle',e.sigle),row('Secteur',e.secteur_activite),row('Détail activité',e.detail_activite),row('Code NAF',e.naf),row('CA annuel',e.ca_annuel!=null?formatCA(e.ca_annuel):null),row('Effectif',e.nb_employes!=null?e.nb_employes+' personnes':null),row('Actionnariat',e.actionnariat),row('Holding',e.holding),row('Mois de clôture',e.mois_cloture)].filter(Boolean).join('');
    const coords = [row('Adresse',e.adresse),row('CP / Ville',[e.cp,e.ville].filter(Boolean).join(' ')),row('Département',e.departement),row('Pays',e.pays),row('Site web',e.site_web?e.site_web.replace(/^https?:\/\//,''):null,e.site_web),row('LinkedIn',e.linkedin?'Voir profil':null,e.linkedin)].filter(Boolean).join('');
    const crm = [row('Type contact',e.type_contact),row('Sous-type',e.sous_type_contact),row('Source',e.source_contact),row('1er contact',fmtDate(e.date_premier_contact)),row('1er RDV',fmtDate(e.date_premier_rdv)),row('Référence',e.reference),row('Lien dossier',e.lien_dossier?'Ouvrir':null,e.lien_dossier)].filter(Boolean).join('');
    const flags = [[e.rappel_prevoir,'Rappel à prévoir'],[e.suivi,'Suivi actif'],[e.teaser_recu,'Teaser reçu'],[e.engagement_conf,'Engagement conf.'],[e.dossier_envoye,'Dossier envoyé'],[e.visite,'Visite effectuée']].filter(([v])=>v).map(([,l])=>`<span class="badge badge-flag">${l}</span>`).join('');
    const contactsHTML = contacts.length
      ? contacts.map(c=>`<div class="contact-card"><div class="contact-card-nom">${esc([c.prenom,c.nom].filter(Boolean).join(' '))}</div><div class="contact-card-fonction">${esc(c.fonction)||'—'}</div><div class="contact-card-links">${c.email_travail?`<a href="mailto:${esc(c.email_travail)}">${esc(c.email_travail)}</a>`:''} ${c.tel_mobile?`<span>${esc(c.tel_mobile)}</span>`:''}</div></div>`).join('')
      : '<p style="font-size:13px;color:#9ba3b8">Aucun contact associé</p>';
    return `${infos?`<div class="detail-section"><h3>Informations</h3>${infos}</div>`:''}${coords?`<div class="detail-section"><h3>Coordonnées</h3>${coords}</div>`:''}${crm?`<div class="detail-section"><h3>CRM</h3>${crm}</div>`:''}${flags?`<div class="detail-section"><h3>Étapes</h3><div class="flags-wrap">${flags}</div></div>`:''}${e.commentaire||e.autres_notes?`<div class="detail-section"><h3>Notes</h3><p style="font-size:13px;color:#333;line-height:1.65">${esc(e.commentaire||e.autres_notes||'')}</p></div>`:''}<div class="detail-section"><h3>Contacts (${contacts.length})</h3>${contactsHTML}</div>`;
  }

  function closeSlideOver() { document.getElementById('overlay').classList.remove('open'); document.getElementById('slideover').classList.remove('open'); }

  function openModal() { document.getElementById('modalWrap').classList.add('open'); setTimeout(() => document.getElementById('fNom').focus(), 50); }

  function closeModal() {
    document.getElementById('modalWrap').classList.remove('open');
    ['fNom','fSigle','fSecteur','fVille','fCa','fEffectif','fDept','fCommentaire'].forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('fStatut').value = 'prospect';
  }

  async function saveEntreprise() {
    const nom = document.getElementById('fNom').value.trim();
    if (!nom) { document.getElementById('fNom').focus(); showToast('Le nom est obligatoire', 'error'); return; }
    const payload = { nom, sigle: val('fSigle'), secteur_activite: val('fSecteur'), ville: val('fVille'), ca_annuel: val('fCa') ? parseFloat(val('fCa')) : null, nb_employes: val('fEffectif') ? parseInt(val('fEffectif')) : null, statut: document.getElementById('fStatut').value, departement: val('fDept'), commentaire: val('fCommentaire') };
    const { data, error } = await db.from('entreprises').insert([payload]).select('id, nom, sigle, ville, secteur_activite, ca_annuel, nb_employes, statut, departement');
    if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
    allData = [data[0], ...allData].sort((a, b) => a.nom.localeCompare(b.nom, 'fr'));
    renderCurrent(); closeModal(); showToast('Entreprise ajoutée ✓', 'success');
  }

  function val(id) { const v = document.getElementById(id).value.trim(); return v || null; }
  function esc(str) { if (str == null) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function formatCA(n) { if (n >= 1_000_000) return (n/1_000_000).toFixed(1).replace('.0','') + ' M€'; if (n >= 1_000) return Math.round(n/1_000) + ' K€'; return n + ' €'; }
  function fmtDate(d) { if (!d) return null; return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
  function badge(statut) {
    const map = { prospect:['badge-prospect','Prospect'], actif:['badge-actif','Actif'], inactif:['badge-inactif','Inactif'], cible:['badge-cible','Cible'], mandat:['badge-mandat','Mandat'] };
    const [cls, label] = map[statut] || ['badge-inactif', statut || '—'];
    return `<span class="badge ${cls}">${label}</span>`;
  }
  async function openEntActModal(){
    const nom = document.getElementById('soNom').textContent;
    document.getElementById('na-ent-label').textContent = '🏢 Entreprise : ' + nom;
    document.getElementById('na-type').value = '';
    document.getElementById('na-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('na-sujet').value = '';
    document.getElementById('na-heure').value = '';
    document.getElementById('na-note').value = '';
    const {data:deals} = await db.from('deals').select('id,titre').eq('statut','ouvert').order('titre');
    document.getElementById('na-deal').innerHTML = '<option value="">— Aucun —</option>'
      + (deals||[]).map(d=>`<option value="${d.id}">${esc(d.titre)}</option>`).join('');
    document.getElementById('na-overlay').classList.add('open');
    document.getElementById('na-modal').style.display = 'flex';
  }

  function closeEntActModal(){
    document.getElementById('na-modal').style.display = 'none';
    document.getElementById('na-overlay').classList.remove('open');
  }

  async function saveEntActModal(){
    const type = document.getElementById('na-type').value;
    const date = document.getElementById('na-date').value;
    if(!type||!date){ showToast('Type et date sont requis', 'error'); return; }
    const payload = {
      type, date_echeance: date,
      sujet:          document.getElementById('na-sujet').value.trim()||null,
      heure_echeance: document.getElementById('na-heure').value||null,
      deal_id:        document.getElementById('na-deal').value||null,
      entreprise_id:  currentEntId||null,
      faite: false,
    };
    const noteContenu = document.getElementById('na-note').value.trim();
    const {data, error} = await db.from('activites').insert([payload]).select('id');
    if(error){ showToast('Erreur : '+error.message, 'error'); return; }
    if(noteContenu && data?.[0]){
      await db.from('notes').insert([{contenu:noteContenu, entreprise_id:currentEntId||null, deal_id:payload.deal_id||null}]);
    }
    closeEntActModal();
    showToast('Activité créée ✓', 'success');
  }

  function showToast(msg, type = 'success') { const t = document.getElementById('toast'); t.textContent = msg; t.className = `toast toast-${type} show`; setTimeout(() => t.classList.remove('show'), 3000); }
</script>
</body>
