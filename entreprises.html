<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entreprises — ERC CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <style>
    /* ── CSS spécifique entreprises.html ── */

    .toolbar { padding: 12px 24px; }
    .toolbar h1 { font-size: 18px; font-weight: 600; flex: 1; }

    /* Toggle vue */
    .view-toggle { display: flex; border: 1px solid #dde1ec; border-radius: 6px; overflow: hidden; }
    .view-btn { height: 36px; width: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: white; border: none; color: #9ba3b8; transition: background 0.15s, color 0.15s; }
    .view-btn.active { background: #172b4d; color: white; }
    .view-btn:hover:not(.active) { background: #f5f6fa; }

    /* Content */
    .content { padding: 24px; }
    .count-label { font-size: 13px; color: #9ba3b8; margin-bottom: 14px; }

    /* Table */
    .table-wrap { background: white; border-radius: 8px; border: 1px solid #e8eaf0; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8f9fc; border-bottom: 1px solid #e8eaf0; }
    th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 700; color: #6b7494; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f0f2f7; cursor: pointer; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8f9fc; }
    td { padding: 12px 16px; color: #1a1a2e; font-size: 14px; }
    td.nom { font-weight: 500; }

    .empty-state { text-align: center; padding: 60px 24px; color: #9ba3b8; }
    .empty-state p { margin-top: 10px; font-size: 13px; }

    /* Cards */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .card { background: white; border-radius: 8px; border: 1px solid #e8eaf0; padding: 20px; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #c5cce0; }
    .card-nom { font-weight: 600; font-size: 15px; color: #1a1a2e; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: #6b7494; margin-bottom: 14px; }
    .card-meta { display: flex; gap: 20px; font-size: 11px; color: #9ba3b8; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 14px; }
    .card-meta span strong { color: #1a1a2e; font-weight: 600; display: block; font-size: 13px; text-transform: none; letter-spacing: 0; margin-top: 2px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #f0f2f7; }

    /* Badges entreprises */
    .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .badge-prospect { background: #e8f0fe; color: #1967d2; }
    .badge-actif    { background: #e6f4ea; color: #137333; }
    .badge-inactif  { background: #f1f3f4; color: #6b7494; }
    .badge-cible    { background: #fce8e6; color: #c5221f; }
    .badge-mandat   { background: #fef7e0; color: #b06000; }

    /* Overlay */
    .overlay { position: fixed; inset: 0; background: rgba(10,20,40,0.4); z-index: 100; display: none; }
    .overlay.open { display: block; }

    /* Drawer élargi pour les nombreux champs */
    .drawer { width: 560px; right: -560px; }
    .drawer.open { right: 0; }

    /* Checkboxes flags */
    .flags-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .flag-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #172b4d; cursor: pointer; padding: 6px 8px; border-radius: 4px; border: 1px solid #e8eaf0; background: #f8f9fc; }
    .flag-item:hover { border-color: #0052cc; }
    .flag-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: #0052cc; cursor: pointer; flex-shrink: 0; }

    /* Toast */
    .toast { bottom: 24px; left: auto; right: 24px; transform: translateY(80px); }
    .toast.show { transform: translateY(0); }

    .loader { text-align: center; padding: 60px; color: #9ba3b8; font-size: 13px; }

    /* Modal activité rapide */
    .modal-wrap { position: fixed; inset: 0; background: rgba(9,30,66,0.45); z-index: 200; display: none; align-items: center; justify-content: center; }
    .modal-wrap.open { display: flex; }
    .modal { background: #fff; border-radius: 10px; width: 440px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid #e8eaf0; display: flex; align-items: center; justify-content: space-between; }
    .modal-header span { font-size: 15px; font-weight: 600; }
    .modal-body { padding: 18px 20px; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid #e8eaf0; display: flex; justify-content: flex-end; gap: 8px; }
    .modal-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .modal-row { margin-bottom: 10px; }
    .form-control { height: 36px; border: 1px solid #dde1ec; border-radius: 6px; padding: 0 12px; font-family: inherit; font-size: 14px; color: #1a1a2e; outline: none; transition: border-color 0.15s; background: white; width: 100%; }
    .form-control:focus { border-color: #0052cc; }
    textarea.form-control { height: auto; padding: 8px 12px; resize: vertical; min-height: 60px; }
    .btn-ghost { background: transparent; border: 1px solid #dde1ec; color: #555; border-radius: 6px; padding: 7px 14px; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-ghost:hover { background: #f5f6fa; }
    .btn-act { height: 30px; padding: 0 10px; background: #f0f5ff; border: 1px solid #c5d8fc; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; color: #0052cc; cursor: pointer; }
    .btn-act:hover { background: #dbeafe; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <h1>ERC CRM</h1>
    <nav class="topbar-nav">
      <a href="index.html">Accueil</a>
      <a href="contacts.html">Contacts</a>
      <a href="entreprises.html" class="active">Entreprises</a>
      <a href="deals.html">Deals</a>
      <a href="activites.html">Activités</a>
      <a href="produits.html">Produits</a>
    </nav>
  </div>
  <button class="btn-primary" onclick="openDrawer(null)">+ Ajouter</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <h1>Entreprises</h1>
  <input type="text" class="search-input" id="searchInput" placeholder="Rechercher nom, ville, secteur…" />
  <div class="view-toggle">
    <button class="view-btn active" id="btnTable" onclick="setView('table')" title="Vue liste">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="11" width="14" height="2" rx="1" fill="currentColor"/></svg>
    </button>
    <button class="view-btn" id="btnCards" onclick="setView('cards')" title="Vue cards">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor"/><rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor"/></svg>
    </button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="count-label" id="countLabel"></div>
  <div id="viewContainer"><div class="loader">Chargement…</div></div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- DRAWER CRUD -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Nouvelle entreprise</h2>
    <div class="drawer-actions">
      <button class="btn-act" id="btnActDrawer" onclick="openActModal()" style="display:none">+ Activité</button>
      <button class="btn-danger" id="btnDelete" onclick="deleteEntreprise()" style="display:none">Supprimer</button>
      <button class="btn-save" onclick="saveEntreprise()">Enregistrer</button>
      <button class="btn-close" onclick="closeDrawer()">×</button>
    </div>
  </div>
  <div class="drawer-body">

    <!-- IDENTITÉ -->
    <div class="form-section">
      <div class="form-section-title">Identité</div>
      <div class="form-row">
        <div class="form-group">
          <label>Nom *</label>
          <input type="text" id="f_nom" placeholder="Raison sociale" />
        </div>
        <div class="form-group" style="flex:0 0 140px">
          <label>Sigle</label>
          <input type="text" id="f_sigle" placeholder="SAS, SARL…" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:0 0 170px">
          <label>Statut</label>
          <select id="f_statut">
            <option value="prospect">Prospect</option>
            <option value="cible">Cible</option>
            <option value="mandat">Mandat</option>
            <option value="actif">Actif</option>
            <option value="inactif">Inactif</option>
          </select>
        </div>
        <div class="form-group">
          <label>Secteur d'activité</label>
          <input type="text" id="f_secteur_activite" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Détail activité</label>
          <input type="text" id="f_detail_activite" />
        </div>
        <div class="form-group" style="flex:0 0 120px">
          <label>Code NAF</label>
          <input type="text" id="f_naf" placeholder="4619A" />
        </div>
      </div>
    </div>

    <!-- DONNÉES FINANCIÈRES -->
    <div class="form-section">
      <div class="form-section-title">Données financières</div>
      <div class="form-row">
        <div class="form-group">
          <label>CA annuel (€)</label>
          <input type="number" id="f_ca_annuel" min="0" placeholder="Ex : 2500000" />
        </div>
        <div class="form-group">
          <label>Effectif</label>
          <input type="number" id="f_nb_employes" min="0" placeholder="Nb salariés" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Actionnariat</label>
          <input type="text" id="f_actionnariat" placeholder="Ex : Familial, PE…" />
        </div>
        <div class="form-group">
          <label>Holding</label>
          <input type="text" id="f_holding" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:0 0 190px">
          <label>Mois de clôture</label>
          <input type="text" id="f_mois_cloture" placeholder="Ex : Décembre" />
        </div>
      </div>
    </div>

    <!-- COORDONNÉES -->
    <div class="form-section">
      <div class="form-section-title">Coordonnées</div>
      <div class="form-row">
        <div class="form-group">
          <label>Site web</label>
          <input type="text" id="f_site_web" placeholder="https://…" />
        </div>
        <div class="form-group">
          <label>LinkedIn</label>
          <input type="text" id="f_linkedin" placeholder="https://linkedin.com/…" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Adresse</label>
          <input type="text" id="f_adresse" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:0 0 100px">
          <label>Code postal</label>
          <input type="text" id="f_cp" maxlength="5" />
        </div>
        <div class="form-group">
          <label>Ville</label>
          <input type="text" id="f_ville" />
        </div>
        <div class="form-group" style="flex:0 0 100px">
          <label>Dép.</label>
          <input type="text" id="f_departement" placeholder="44" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:0 0 180px">
          <label>Pays</label>
          <input type="text" id="f_pays" placeholder="France" />
        </div>
      </div>
    </div>

    <!-- CRM -->
    <div class="form-section">
      <div class="form-section-title">CRM</div>
      <div class="form-row">
        <div class="form-group">
          <label>Type contact</label>
          <input type="text" id="f_type_contact" />
        </div>
        <div class="form-group">
          <label>Sous-type</label>
          <input type="text" id="f_sous_type_contact" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Source contact</label>
          <input type="text" id="f_source_contact" placeholder="Réseau, Site web…" />
        </div>
        <div class="form-group">
          <label>Référence</label>
          <input type="text" id="f_reference" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Lien dossier</label>
          <input type="text" id="f_lien_dossier" placeholder="https://…" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>1er contact</label>
          <input type="date" id="f_date_premier_contact" />
        </div>
        <div class="form-group">
          <label>1er RDV</label>
          <input type="date" id="f_date_premier_rdv" />
        </div>
      </div>
    </div>

    <!-- PROFIL CIBLE -->
    <div class="form-section">
      <div class="form-section-title">Profil cible acquéreur</div>
      <div class="form-row">
        <div class="form-group">
          <label>Secteur cible</label>
          <input type="text" id="f_cible_secteur" />
        </div>
        <div class="form-group">
          <label>Détail cible</label>
          <input type="text" id="f_cible_detail" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Localisation cible</label>
          <input type="text" id="f_cible_localisation" />
        </div>
        <div class="form-group">
          <label>Capital disponible</label>
          <input type="text" id="f_cible_capital_dispo" placeholder="Ex : 500K€" />
        </div>
      </div>
    </div>

    <!-- ÉTAPES DU DOSSIER -->
    <div class="form-section">
      <div class="form-section-title">Étapes du dossier</div>
      <div class="flags-form">
        <label class="flag-item"><input type="checkbox" id="f_rappel_prevoir" /> Rappel à prévoir</label>
        <label class="flag-item"><input type="checkbox" id="f_suivi" /> Suivi actif</label>
        <label class="flag-item"><input type="checkbox" id="f_teaser_recu" /> Teaser reçu</label>
        <label class="flag-item"><input type="checkbox" id="f_engagement_conf" /> Engagement conf.</label>
        <label class="flag-item"><input type="checkbox" id="f_dossier_envoye" /> Dossier envoyé</label>
        <label class="flag-item"><input type="checkbox" id="f_visite" /> Visite effectuée</label>
      </div>
    </div>

    <!-- NOTES -->
    <div class="form-section">
      <div class="form-section-title">Notes</div>
      <div class="form-row">
        <div class="form-group">
          <label>Commentaire</label>
          <textarea id="f_commentaire" rows="3"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Autres notes</label>
          <textarea id="f_autres_notes" rows="3"></textarea>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL ACTIVITÉ RAPIDE -->
<div class="modal-wrap" id="actModalWrap">
  <div class="modal">
    <div class="modal-header">
      <span>Nouvelle activité</span>
      <button class="btn-close" onclick="closeActModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="actEntLabel" style="background:#f0f5ff;border:1px solid #c5d8fc;border-radius:6px;padding:7px 12px;font-size:12px;color:#0052cc;font-weight:600;margin-bottom:14px"></div>
      <div class="modal-grid-2">
        <div class="form-group">
          <label>Type *</label>
          <select class="form-control" id="act_type">
            <option value="">— Choisir —</option>
            <option value="appel">📞 Appel</option>
            <option value="rdv">🤝 RDV</option>
            <option value="email">✉️ Email</option>
            <option value="tache">✅ Tâche</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input type="date" class="form-control" id="act_date" />
        </div>
      </div>
      <div class="modal-row">
        <div class="form-group">
          <label>Sujet</label>
          <input type="text" class="form-control" id="act_sujet" placeholder="Ex : Appel de suivi" />
        </div>
      </div>
      <div class="modal-grid-2">
        <div class="form-group">
          <label>Heure</label>
          <input type="time" class="form-control" id="act_heure" />
        </div>
        <div class="form-group">
          <label>Deal associé</label>
          <select class="form-control" id="act_deal"><option value="">— Aucun —</option></select>
        </div>
      </div>
      <div class="modal-row">
        <div class="form-group">
          <label>Note</label>
          <textarea class="form-control" id="act_note" placeholder="Contexte…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeActModal()">Annuler</button>
      <button class="btn-primary" onclick="saveActModal()">Créer</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const db = window.supabase;
  let allData = [], currentView = 'table', currentId = null;

  document.addEventListener('DOMContentLoaded', () => {
    loadEntreprises();
    document.getElementById('searchInput').addEventListener('input', renderCurrent);
  });

  async function loadEntreprises() {
    const { data, error } = await db
      .from('entreprises')
      .select('id, nom, sigle, ville, secteur_activite, ca_annuel, nb_employes, statut, departement')
      .order('nom');
    if (error) { showToast('Erreur chargement : ' + error.message, 'error'); document.getElementById('viewContainer').innerHTML = '<div class="empty-state"><p>Impossible de charger les données.</p></div>'; return; }
    allData = data || [];
    renderCurrent();
  }

  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    if (!q) return allData;
    return allData.filter(e =>
      (e.nom || '').toLowerCase().includes(q) ||
      (e.ville || '').toLowerCase().includes(q) ||
      (e.secteur_activite || '').toLowerCase().includes(q)
    );
  }

  function renderCurrent() {
    const data = getFiltered(), n = data.length, total = allData.length;
    document.getElementById('countLabel').textContent = total !== n
      ? `${n} entreprise${n > 1 ? 's' : ''} (filtrées sur ${total})`
      : `${n} entreprise${n > 1 ? 's' : ''}`;
    currentView === 'table' ? renderTable(data) : renderCards(data);
  }

  function renderTable(data) {
    const c = document.getElementById('viewContainer');
    if (!data.length) { c.innerHTML = '<div class="empty-state"><p>Aucune entreprise trouvée</p></div>'; return; }
    c.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Nom</th><th>Ville</th><th>Secteur</th><th>CA annuel</th><th>Effectif</th><th>Statut</th></tr></thead>
      <tbody>${data.map(e => `<tr onclick="openDrawer('${e.id}')">
        <td class="nom">${esc(e.nom)}${e.sigle ? `<span style="color:#9ba3b8;font-weight:400;font-size:12px;margin-left:6px">${esc(e.sigle)}</span>` : ''}</td>
        <td>${esc(e.ville)||'<span style="color:#c5cce0">—</span>'}</td>
        <td>${esc(e.secteur_activite)||'<span style="color:#c5cce0">—</span>'}</td>
        <td>${e.ca_annuel!=null?formatCA(e.ca_annuel):'<span style="color:#c5cce0">—</span>'}</td>
        <td>${e.nb_employes!=null?e.nb_employes:'<span style="color:#c5cce0">—</span>'}</td>
        <td>${badge(e.statut)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  function renderCards(data) {
    const c = document.getElementById('viewContainer');
    if (!data.length) { c.innerHTML = '<div class="empty-state"><p>Aucune entreprise trouvée</p></div>'; return; }
    c.innerHTML = `<div class="cards-grid">${data.map(e => `
      <div class="card" onclick="openDrawer('${e.id}')">
        <div class="card-nom">${esc(e.nom)}</div>
        <div class="card-sub">${[e.secteur_activite,e.ville].filter(Boolean).map(esc).join(' · ')||'—'}</div>
        <div class="card-meta">
          <span>CA<strong>${e.ca_annuel!=null?formatCA(e.ca_annuel):'—'}</strong></span>
          <span>Effectif<strong>${e.nb_employes!=null?e.nb_employes+' p.':'—'}</strong></span>
        </div>
        <div class="card-footer">${badge(e.statut)}<span style="font-size:11px;color:#9ba3b8">${esc(e.departement)||''}</span></div>
      </div>`).join('')}</div>`;
  }

  function setView(v) {
    currentView = v;
    document.getElementById('btnTable').classList.toggle('active', v === 'table');
    document.getElementById('btnCards').classList.toggle('active', v === 'cards');
    renderCurrent();
  }

  // ── Drawer CRUD ────────────────────────────────────────────────────────────
  async function openDrawer(id) {
    currentId = id;
    clearForm();
    if (id) {
      document.getElementById('drawerTitle').textContent = '…';
      document.getElementById('btnDelete').style.display = 'inline-block';
      document.getElementById('btnActDrawer').style.display = 'inline-block';
      const { data, error } = await db.from('entreprises').select('*').eq('id', id).single();
      if (error || !data) { showToast('Erreur chargement', 'error'); return; }
      document.getElementById('drawerTitle').textContent = data.nom || 'Entreprise';
      fillForm(data);
    } else {
      document.getElementById('drawerTitle').textContent = 'Nouvelle entreprise';
      document.getElementById('btnDelete').style.display = 'none';
      document.getElementById('btnActDrawer').style.display = 'none';
    }
    document.getElementById('overlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
    currentId = null;
  }

  function clearForm() {
    ['f_nom','f_sigle','f_secteur_activite','f_detail_activite','f_naf',
     'f_ca_annuel','f_nb_employes','f_actionnariat','f_holding','f_mois_cloture',
     'f_site_web','f_linkedin','f_adresse','f_cp','f_ville','f_departement','f_pays',
     'f_type_contact','f_sous_type_contact','f_source_contact','f_reference','f_lien_dossier',
     'f_date_premier_contact','f_date_premier_rdv',
     'f_cible_secteur','f_cible_detail','f_cible_localisation','f_cible_capital_dispo',
     'f_commentaire','f_autres_notes']
      .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('f_statut').value = 'prospect';
    ['f_rappel_prevoir','f_suivi','f_teaser_recu','f_engagement_conf','f_dossier_envoye','f_visite']
      .forEach(id => { const el = document.getElementById(id); if (el) el.checked = false; });
  }

  function fillForm(e) {
    const s = (id, v) => { const el = document.getElementById(id); if (el) el.value = v ?? ''; };
    const c = (id, v) => { const el = document.getElementById(id); if (el) el.checked = !!v; };
    s('f_nom', e.nom);                          s('f_sigle', e.sigle);
    s('f_secteur_activite', e.secteur_activite); s('f_detail_activite', e.detail_activite);
    s('f_naf', e.naf);                          s('f_statut', e.statut || 'prospect');
    s('f_ca_annuel', e.ca_annuel);              s('f_nb_employes', e.nb_employes);
    s('f_actionnariat', e.actionnariat);        s('f_holding', e.holding);
    s('f_mois_cloture', e.mois_cloture);        s('f_site_web', e.site_web);
    s('f_linkedin', e.linkedin);                s('f_adresse', e.adresse);
    s('f_cp', e.cp);                            s('f_ville', e.ville);
    s('f_departement', e.departement);          s('f_pays', e.pays);
    s('f_type_contact', e.type_contact);        s('f_sous_type_contact', e.sous_type_contact);
    s('f_source_contact', e.source_contact);    s('f_reference', e.reference);
    s('f_lien_dossier', e.lien_dossier);
    s('f_date_premier_contact', e.date_premier_contact);
    s('f_date_premier_rdv', e.date_premier_rdv);
    s('f_cible_secteur', e.cible_secteur);      s('f_cible_detail', e.cible_detail);
    s('f_cible_localisation', e.cible_localisation);
    s('f_cible_capital_dispo', e.cible_capital_dispo);
    s('f_commentaire', e.commentaire);          s('f_autres_notes', e.autres_notes);
    c('f_rappel_prevoir', e.rappel_prevoir);    c('f_suivi', e.suivi);
    c('f_teaser_recu', e.teaser_recu);          c('f_engagement_conf', e.engagement_conf);
    c('f_dossier_envoye', e.dossier_envoye);    c('f_visite', e.visite);
  }

  function getFormData() {
    const g  = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const gc = id => { const el = document.getElementById(id); return el ? el.checked : false; };
    const gn = id => { const v = g(id); return v !== '' ? parseFloat(v) : null; };
    const gi = id => { const v = g(id); return v !== '' ? parseInt(v, 10) : null; };
    return {
      nom: g('f_nom'),
      sigle: g('f_sigle') || null,
      secteur_activite: g('f_secteur_activite') || null,
      detail_activite: g('f_detail_activite') || null,
      naf: g('f_naf') || null,
      statut: g('f_statut') || 'prospect',
      ca_annuel: gn('f_ca_annuel'),
      nb_employes: gi('f_nb_employes'),
      actionnariat: g('f_actionnariat') || null,
      holding: g('f_holding') || null,
      mois_cloture: g('f_mois_cloture') || null,
      site_web: g('f_site_web') || null,
      linkedin: g('f_linkedin') || null,
      adresse: g('f_adresse') || null,
      cp: g('f_cp') || null,
      ville: g('f_ville') || null,
      departement: g('f_departement') || null,
      pays: g('f_pays') || null,
      type_contact: g('f_type_contact') || null,
      sous_type_contact: g('f_sous_type_contact') || null,
      source_contact: g('f_source_contact') || null,
      reference: g('f_reference') || null,
      lien_dossier: g('f_lien_dossier') || null,
      date_premier_contact: g('f_date_premier_contact') || null,
      date_premier_rdv: g('f_date_premier_rdv') || null,
      cible_secteur: g('f_cible_secteur') || null,
      cible_detail: g('f_cible_detail') || null,
      cible_localisation: g('f_cible_localisation') || null,
      cible_capital_dispo: g('f_cible_capital_dispo') || null,
      rappel_prevoir: gc('f_rappel_prevoir'),
      suivi: gc('f_suivi'),
      teaser_recu: gc('f_teaser_recu'),
      engagement_conf: gc('f_engagement_conf'),
      dossier_envoye: gc('f_dossier_envoye'),
      visite: gc('f_visite'),
      commentaire: g('f_commentaire') || null,
      autres_notes: g('f_autres_notes') || null,
      updated_at: new Date().toISOString(),
    };
  }

  async function saveEntreprise() {
    const data = getFormData();
    if (!data.nom) { showToast('Le nom est obligatoire', 'error'); return; }
    let error;
    if (currentId) {
      ({ error } = await db.from('entreprises').update(data).eq('id', currentId));
    } else {
      ({ error } = await db.from('entreprises').insert(data));
    }
    if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
    showToast(currentId ? 'Entreprise mise à jour ✓' : 'Entreprise créée ✓', 'success');
    closeDrawer();
    loadEntreprises();
  }

  async function deleteEntreprise() {
    if (!confirm('Supprimer cette entreprise ? Cette action est irréversible.')) return;
    const { error } = await db.from('entreprises').delete().eq('id', currentId);
    if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
    showToast('Entreprise supprimée');
    closeDrawer();
    loadEntreprises();
  }

  // ── Modal activité rapide ──────────────────────────────────────────────────
  async function openActModal() {
    document.getElementById('actEntLabel').textContent = '🏢 ' + document.getElementById('drawerTitle').textContent;
    document.getElementById('act_type').value  = '';
    document.getElementById('act_date').value  = new Date().toISOString().split('T')[0];
    document.getElementById('act_sujet').value = '';
    document.getElementById('act_heure').value = '';
    document.getElementById('act_note').value  = '';
    const { data: deals } = await db.from('deals').select('id, titre').eq('statut', 'ouvert').order('titre');
    document.getElementById('act_deal').innerHTML = '<option value="">— Aucun —</option>'
      + (deals || []).map(d => `<option value="${d.id}">${esc(d.titre)}</option>`).join('');
    document.getElementById('actModalWrap').classList.add('open');
  }

  function closeActModal() { document.getElementById('actModalWrap').classList.remove('open'); }

  async function saveActModal() {
    const type = document.getElementById('act_type').value;
    const date = document.getElementById('act_date').value;
    if (!type || !date) { showToast('Type et date sont requis', 'error'); return; }
    const payload = {
      type, date_echeance: date,
      sujet:          document.getElementById('act_sujet').value.trim() || null,
      heure_echeance: document.getElementById('act_heure').value        || null,
      deal_id:        document.getElementById('act_deal').value         || null,
      entreprise_id:  currentId || null,
      faite: false,
    };
    const { data, error } = await db.from('activites').insert([payload]).select('id');
    if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
    const note = document.getElementById('act_note').value.trim();
    if (note && data?.[0]) {
      await db.from('notes').insert([{ contenu: note, entreprise_id: currentId || null, deal_id: payload.deal_id || null }]);
    }
    closeActModal();
    showToast('Activité créée ✓', 'success');
  }

  document.getElementById('actModalWrap').addEventListener('click', e => {
    if (e.target === document.getElementById('actModalWrap')) closeActModal();
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function formatCA(n) {
    if (n >= 1_000_000) return (n/1_000_000).toFixed(1).replace('.0','') + ' M€';
    if (n >= 1_000) return Math.round(n/1_000) + ' K€';
    return n + ' €';
  }
  function badge(statut) {
    const map = { prospect:['badge-prospect','Prospect'], actif:['badge-actif','Actif'], inactif:['badge-inactif','Inactif'], cible:['badge-cible','Cible'], mandat:['badge-mandat','Mandat'] };
    const [cls, label] = map[statut] || ['badge-inactif', statut || '—'];
    return `<span class="badge ${cls}">${label}</span>`;
  }
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast toast-${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
