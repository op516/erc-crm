<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacts — ERC CRM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <h1>ERC CRM</h1>
    <nav class="topbar-nav">
      <a href="deals.html">Deals</a>
      <a href="contacts.html" class="active">Contacts</a>
      <a href="entreprises.html">Entreprises</a>
      <a href="activites.html">Activités</a>
    </nav>
  </div>
  <button class="btn-primary" onclick="openDrawer(null)">+ Nouveau contact</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <input class="search-input" type="text" id="searchInput" placeholder="Rechercher par nom…" oninput="applyFilters()" />
  <select class="filter-select" id="filterCategorie" onchange="applyFilters()">
    <option value="">Toutes catégories</option>
    <option>Cédant</option>
    <option>Acquéreur</option>
    <option>Prescripteur</option>
    <option>Partenaire</option>
    <option>Autre</option>
  </select>
  <select class="filter-select" id="filterOrigine" onchange="applyFilters()">
    <option value="">Toutes origines</option>
    <option>Réseau</option>
    <option>Recommandation</option>
    <option>Site web</option>
    <option>Salon</option>
    <option>Appel entrant</option>
    <option>Prospection</option>
    <option>Autre</option>
  </select>
  <button class="btn-reset" onclick="resetFilters()">Réinitialiser</button>
  <span class="count-label" id="countLabel"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Entreprise</th>
        <th>Fonction</th>
        <th>Email</th>
        <th>Téléphone</th>
        <th>Catégorie</th>
        <th>Origine</th>
      </tr>
    </thead>
    <tbody id="contactsBody">
      <tr><td colspan="7" class="empty-state">Chargement…</td></tr>
    </tbody>
  </table>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2 id="drawerTitle">Nouveau contact</h2>
    <div class="drawer-actions">
      <button class="btn-danger" id="btnDelete" onclick="deleteContact()" style="display:none;">Supprimer</button>
      <button class="btn-save" onclick="saveContact()">Enregistrer</button>
      <button class="btn-close" onclick="closeDrawer()">×</button>
    </div>
  </div>
  <div class="drawer-body">

    <div class="form-section">
      <div class="form-section-title">Identité</div>
      <div class="form-row">
        <div class="form-group" style="flex:0 0 90px;">
          <label>Civilité</label>
          <select id="f_civilite">
            <option value="">—</option>
            <option>M.</option>
            <option>Mme</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" id="f_prenom" />
        </div>
        <div class="form-group">
          <label>Nom *</label>
          <input type="text" id="f_nom" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Fonction</label>
          <input type="text" id="f_fonction" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Catégorie</label>
          <select id="f_classification">
            <option value="">—</option>
            <option>Cédant</option>
            <option>Acquéreur</option>
            <option>Prescripteur</option>
            <option>Partenaire</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Origine contact</label>
          <select id="f_origine_contact">
            <option value="">—</option>
            <option>Réseau</option>
            <option>Recommandation</option>
            <option>Site web</option>
            <option>Salon</option>
            <option>Appel entrant</option>
            <option>Prospection</option>
            <option>Autre</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Entreprise</div>
      <div class="form-row">
        <div class="form-group">
          <label>Entreprise liée</label>
          <select id="f_entreprise_id">
            <option value="">— Aucune —</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Coordonnées</div>
      <div class="form-row">
        <div class="form-group">
          <label>Email professionnel</label>
          <input type="text" id="f_email_travail" oninput="validateEmail(this,'hint_email_travail')" />
          <span class="field-hint" id="hint_email_travail">Format attendu : nom@domaine.fr</span>
        </div>
        <div class="form-group">
          <label>Email personnel</label>
          <input type="text" id="f_email_perso" oninput="validateEmail(this,'hint_email_perso')" />
          <span class="field-hint" id="hint_email_perso">Format attendu : nom@domaine.fr</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Mobile</label>
          <input type="text" id="f_tel_mobile" oninput="formatTel(this)" placeholder="06 xx xx xx xx" />
        </div>
        <div class="form-group">
          <label>Téléphone bureau</label>
          <input type="text" id="f_tel_travail" oninput="formatTel(this)" placeholder="01 xx xx xx xx" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Adresse</div>
      <div class="form-row">
        <div class="form-group">
          <label>Adresse</label>
          <input type="text" id="f_adresse_perso" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:0 0 130px;">
          <label>Code postal</label>
          <input type="text" id="f_cp_perso" maxlength="5" />
        </div>
        <div class="form-group">
          <label>Ville</label>
          <input type="text" id="f_ville_perso" />
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Notes</div>
      <div class="form-row">
        <div class="form-group">
          <textarea id="f_notes" rows="4"></textarea>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let allContacts = [];
  let entreprises  = [];
  let currentId    = null;

  async function init() {
    const [{ data: contacts, error }, { data: ents }] = await Promise.all([
      supabase.from('contacts').select('*, entreprises(nom)').order('nom', { ascending: true }),
      supabase.from('entreprises').select('id, nom').order('nom', { ascending: true })
    ]);
    if (error) { showToast('Erreur chargement contacts', true); return; }
    allContacts = contacts || [];
    entreprises  = ents    || [];
    applyFilters();
    populateEntreprises();
  }

  function renderTable(contacts) {
    const tbody = document.getElementById('contactsBody');
    document.getElementById('countLabel').textContent =
      contacts.length + ' contact' + (contacts.length > 1 ? 's' : '');
    if (!contacts.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Aucun contact trouvé.</td></tr>';
      return;
    }
    tbody.innerHTML = contacts.map(c => {
      const initiales  = ((c.prenom?.[0] || '') + (c.nom?.[0] || '')).toUpperCase() || '?';
      const nomComplet = [c.prenom, c.nom].filter(Boolean).join(' ');
      const ent        = c.entreprises?.nom || '';
      const badgeClass = { 'Cédant':'cedant','Acquéreur':'acquereur','Prescripteur':'prescripteur','Partenaire':'partenaire' }[c.classification] || '';
      return `
        <tr onclick="openDrawer('${c.id}')">
          <td><div class="nom-wrap"><div class="avatar">${initiales}</div>${nomComplet}</div></td>
          <td class="muted">${ent}</td>
          <td class="muted">${c.fonction || ''}</td>
          <td class="muted">${c.email_travail || ''}</td>
          <td class="muted">${c.tel_mobile || ''}</td>
          <td>${c.classification ? `<span class="badge ${badgeClass}">${c.classification}</span>` : ''}</td>
          <td class="muted">${c.origine_contact || ''}</td>
        </tr>`;
    }).join('');
  }

  function applyFilters() {
    const q    = document.getElementById('searchInput').value.toLowerCase();
    const cat  = document.getElementById('filterCategorie').value;
    const orig = document.getElementById('filterOrigine').value;
    const filtered = allContacts.filter(c => {
      const nom = ((c.prenom || '') + ' ' + (c.nom || '')).toLowerCase();
      return (!q || nom.includes(q)) && (!cat || c.classification === cat) && (!orig || c.origine_contact === orig);
    });
    renderTable(filtered);
  }

  function resetFilters() {
    document.getElementById('searchInput').value     = '';
    document.getElementById('filterCategorie').value = '';
    document.getElementById('filterOrigine').value   = '';
    applyFilters();
  }

  function populateEntreprises() {
    const sel = document.getElementById('f_entreprise_id');
    sel.innerHTML = '<option value="">— Aucune —</option>';
    entreprises.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.nom;
      sel.appendChild(opt);
    });
  }

  function validateEmail(input, hintId) {
    const val  = input.value.trim();
    const hint = document.getElementById(hintId);
    if (val && !val.includes('@')) {
      input.classList.add('invalid'); hint.classList.add('show');
    } else {
      input.classList.remove('invalid'); hint.classList.remove('show');
    }
  }

  function formatTel(input) {
    let digits = input.value.replace(/\D/g, '').slice(0, 10);
    if (digits.length > 0) input.value = digits.match(/.{1,2}/g).join(' ');
  }

  function openDrawer(id) {
    currentId = id;
    clearForm();
    if (id) {
      const c = allContacts.find(x => x.id === id);
      if (!c) return;
      document.getElementById('drawerTitle').textContent = [c.prenom, c.nom].filter(Boolean).join(' ') || 'Contact';
      document.getElementById('btnDelete').style.display = 'inline-block';
      fillForm(c);
    } else {
      document.getElementById('drawerTitle').textContent = 'Nouveau contact';
      document.getElementById('btnDelete').style.display = 'none';
    }
    document.getElementById('overlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
    currentId = null;
  }

  function clearForm() {
    ['f_civilite','f_prenom','f_nom','f_fonction','f_classification','f_origine_contact',
     'f_entreprise_id','f_email_travail','f_email_perso','f_tel_mobile','f_tel_travail',
     'f_adresse_perso','f_cp_perso','f_ville_perso','f_notes']
      .forEach(id => { document.getElementById(id).value = ''; });
    ['hint_email_travail','hint_email_perso'].forEach(id => document.getElementById(id).classList.remove('show'));
    ['f_email_travail','f_email_perso'].forEach(id => document.getElementById(id).classList.remove('invalid'));
  }

  function fillForm(c) {
    const set = (id, val) => { document.getElementById(id).value = val || ''; };
    set('f_civilite', c.civilite); set('f_prenom', c.prenom); set('f_nom', c.nom);
    set('f_fonction', c.fonction); set('f_classification', c.classification);
    set('f_origine_contact', c.origine_contact); set('f_entreprise_id', c.entreprise_id);
    set('f_email_travail', c.email_travail); set('f_email_perso', c.email_perso);
    set('f_tel_mobile', c.tel_mobile); set('f_tel_travail', c.tel_travail);
    set('f_adresse_perso', c.adresse_perso); set('f_cp_perso', c.cp_perso);
    set('f_ville_perso', c.ville_perso); set('f_notes', c.notes);
  }

  function getFormData() {
    const g = id => document.getElementById(id).value.trim();
    return {
      civilite: g('f_civilite') || null, prenom: g('f_prenom') || null,
      nom: g('f_nom'), fonction: g('f_fonction') || null,
      classification: g('f_classification') || null, origine_contact: g('f_origine_contact') || null,
      entreprise_id: g('f_entreprise_id') || null, email_travail: g('f_email_travail') || null,
      email_perso: g('f_email_perso') || null, tel_mobile: g('f_tel_mobile') || null,
      tel_travail: g('f_tel_travail') || null, adresse_perso: g('f_adresse_perso') || null,
      cp_perso: g('f_cp_perso') || null, ville_perso: g('f_ville_perso') || null,
      notes: g('f_notes') || null, updated_at: new Date().toISOString()
    };
  }

  async function saveContact() {
    const data = getFormData();
    if (!data.nom) { showToast('Le nom est obligatoire', true); return; }
    let error;
    if (currentId) {
      ({ error } = await supabase.from('contacts').update(data).eq('id', currentId));
    } else {
      ({ error } = await supabase.from('contacts').insert(data));
    }
    if (error) { showToast('Erreur : ' + error.message, true); return; }
    showToast(currentId ? 'Contact mis à jour' : 'Contact créé');
    closeDrawer(); init();
  }

  async function deleteContact() {
    if (!confirm('Supprimer ce contact ? Cette action est irréversible.')) return;
    const { error } = await supabase.from('contacts').delete().eq('id', currentId);
    if (error) { showToast('Erreur : ' + error.message, true); return; }
    showToast('Contact supprimé');
    closeDrawer(); init();
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  init();
</script>
</body>
</html>
