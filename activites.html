<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activités — ERC CRM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── CSS spécifique à activites.html ── */

    .period-tabs {
      display: flex;
      gap: 2px;
      padding: 0 24px 0;
      border-bottom: 1px solid #e0e6f0;
      background: #fff;
    }
    .ptab {
      padding: 10px 16px;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #6b778c;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ptab:hover { color: #172b4d; }
    .ptab.active { color: #0052cc; border-bottom-color: #0052cc; font-weight: 600; }
    .ptab-badge { background: #de350b; color: #fff; border-radius: 20px; font-size: 10px; font-weight: 700; padding: 1px 6px; line-height: 1.4; }
    .ptab-badge.hidden { display: none; }

    .type-filters { padding: 10px 24px; display: flex; gap: 8px; flex-wrap: wrap; background: #f4f5f7; border-bottom: 1px solid #e0e6f0; }
    .tfbtn { border: 1px solid #dfe1e6; background: #fff; border-radius: 20px; padding: 4px 13px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: #6b778c; cursor: pointer; transition: all 0.15s; }
    .tfbtn:hover { border-color: #0052cc; color: #0052cc; }
    .tfbtn.active { background: #0052cc; border-color: #0052cc; color: #fff; }

    .list-area { padding: 16px 24px 40px; flex: 1; overflow-y: auto; }
    .group-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #6b778c; margin: 20px 0 8px; }
    .group-label:first-child { margin-top: 0; }
    .group-label.late { color: #de350b; }

    .act-card { background: #fff; border: 1px solid #dfe1e6; border-radius: 6px; padding: 12px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 6px; transition: box-shadow 0.15s, border-color 0.15s; }
    .act-card:hover { border-color: #c1c7d0; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .act-card.done { opacity: 0.5; }
    .act-card.late { border-left: 3px solid #de350b; }

    .act-check { width: 18px; height: 18px; cursor: pointer; accent-color: #0052cc; flex-shrink: 0; }

    .type-pill { flex-shrink: 0; border-radius: 4px; padding: 3px 9px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
    .pill-appel { background: #deebff; color: #0052cc; }
    .pill-rdv   { background: #e3fcef; color: #006644; }
    .pill-email { background: #fffae6; color: #974f0c; }
    .pill-tache { background: #eae6ff; color: #403294; }
    .pill-autre { background: #f4f5f7; color: #6b778c; }

    .act-body { flex: 1; min-width: 0; }
    .act-sujet { font-size: 14px; font-weight: 600; color: #172b4d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .act-meta { font-size: 12px; color: #6b778c; display: flex; gap: 10px; flex-wrap: wrap; }
    .act-meta a { color: #0052cc; text-decoration: none; }
    .act-meta a:hover { text-decoration: underline; }
    .act-date { font-size: 12px; color: #6b778c; text-align: right; white-space: nowrap; flex-shrink: 0; line-height: 1.6; }
    .act-date.late { color: #de350b; font-weight: 600; }

    .btn-del { background: none; border: none; cursor: pointer; color: #c1c7d0; font-size: 15px; padding: 0 4px; flex-shrink: 0; line-height: 1; transition: color 0.15s; }
    .btn-del:hover { color: #de350b; }

    .modal-wrap { position: fixed; inset: 0; background: rgba(9,30,66,.45); z-index: 100; display: none; align-items: center; justify-content: center; }
    .modal-wrap.open { display: flex; }
    .modal { background: #fff; border-radius: 8px; width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,.2); }
    .modal-header { padding: 18px 24px; border-bottom: 1px solid #dfe1e6; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 16px; font-weight: 600; color: #172b4d; }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 14px 24px; border-top: 1px solid #dfe1e6; display: flex; justify-content: flex-end; gap: 8px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row-1 { margin-bottom: 12px; }

    .view-toggle { display: flex; border: 1px solid #dfe1e6; border-radius: 4px; overflow: hidden; margin-left: auto; }
    .view-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: #fff; border: none; cursor: pointer; color: #6b778c; transition: background 0.15s, color 0.15s; }
    .view-btn.active { background: #172b4d; color: #fff; }
    .view-btn:hover:not(.active) { background: #f4f5f7; }

    .table-area { padding: 16px 24px 40px; flex: 1; overflow-y: auto; display: none; }
    .table-area.show { display: block; }
    .list-area.hide { display: none; }

    .act-table-wrap { background: #fff; border-radius: 8px; border: 1px solid #e8eaf0; overflow: hidden; }
    .act-table-wrap table { width: 100%; border-collapse: collapse; }
    .act-table-wrap thead { background: #f8f9fc; border-bottom: 1px solid #e8eaf0; }
    .act-table-wrap th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 700; color: #6b7494; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; cursor: pointer; user-select: none; }
    .act-table-wrap th:hover { color: #172b4d; }
    .sort-arrow { margin-left: 4px; opacity: 0.4; font-size: 10px; }
    .sort-arrow.active { opacity: 1; color: #0052cc; }
    .act-table-wrap tbody tr { border-bottom: 1px solid #f0f2f7; transition: background 0.1s; }
    .act-table-wrap tbody tr:last-child { border-bottom: none; }
    .act-table-wrap tbody tr:hover { background: #f8f9fc; }
    .act-table-wrap td { padding: 10px 16px; font-size: 13px; color: #172b4d; vertical-align: middle; }
    .td-sujet { font-weight: 500; }
    .td-muted { color: #6b778c; font-size: 12px; }
    .td-check { width: 36px; text-align: center; }
    .td-check input { accent-color: #0052cc; cursor: pointer; width: 16px; height: 16px; }
    .td-del { width: 36px; text-align: center; }
    .td-late { color: #de350b; font-weight: 600; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <h1>ERC CRM</h1>
    <nav class="topbar-nav">
      <a href="contacts.html">Contacts</a>
      <a href="entreprises.html">Entreprises</a>
      <a href="deals.html">Deals</a>
      <a href="activites.html" class="active">Activités</a>
    </nav>
  </div>
  <button class="btn-primary" onclick="openModal()">+ Nouvelle activité</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span style="font-size:18px;font-weight:600;color:#172b4d">Activités</span>
  <span class="count-label" id="countLabel"></span>
  <div class="view-toggle">
    <button class="view-btn" id="btn-cards" onclick="setView('cards')" title="Vue cartes">
      <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="1" width="5" height="5" rx=".6"/><rect x="8" y="1" width="5" height="5" rx=".6"/>
        <rect x="1" y="8" width="5" height="5" rx=".6"/><rect x="8" y="8" width="5" height="5" rx=".6"/>
      </svg>
    </button>
    <button class="view-btn active" id="btn-table" onclick="setView('table')" title="Vue tableau">
      <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <line x1="1" y1="3.5" x2="13" y2="3.5"/><line x1="1" y1="7" x2="13" y2="7"/>
        <line x1="1" y1="10.5" x2="13" y2="10.5"/>
      </svg>
    </button>
  </div>
</div>

<!-- TABS PÉRIODE -->
<div class="period-tabs">
  <button class="ptab active" data-period="retard" onclick="setPeriod('retard')">
    En retard <span class="ptab-badge hidden" id="badge-retard">0</span>
  </button>
  <button class="ptab" data-period="today" onclick="setPeriod('today')">Aujourd'hui</button>
  <button class="ptab" data-period="week"  onclick="setPeriod('week')">Cette semaine</button>
  <button class="ptab" data-period="all"   onclick="setPeriod('all')">Toutes</button>
</div>

<!-- FILTRES TYPE -->
<div class="type-filters">
  <button class="tfbtn active" data-type="all"  onclick="setType('all')">Tous types</button>
  <button class="tfbtn" data-type="appel"  onclick="setType('appel')">📞 Appel</button>
  <button class="tfbtn" data-type="rdv"    onclick="setType('rdv')">🤝 RDV</button>
  <button class="tfbtn" data-type="email"  onclick="setType('email')">✉️ Email</button>
  <button class="tfbtn" data-type="tache"  onclick="setType('tache')">✅ Tâche</button>
</div>

<div class="list-area hide" id="listArea"><div class="empty-state">Chargement…</div></div>

<div class="table-area show" id="tableArea">
  <div class="act-table-wrap">
    <table>
      <thead><tr>
        <th class="td-check"></th>
        <th onclick="sortBy('type')">Type <span class="sort-arrow" id="arr-type">↕</span></th>
        <th onclick="sortBy('sujet')">Sujet <span class="sort-arrow" id="arr-sujet">↕</span></th>
        <th onclick="sortBy('lien')">Lié à <span class="sort-arrow" id="arr-lien">↕</span></th>
        <th onclick="sortBy('date')">Date <span class="sort-arrow active" id="arr-date">↑</span></th>
        <th onclick="sortBy('heure')">Heure <span class="sort-arrow" id="arr-heure">↕</span></th>
        <th onclick="sortBy('faite')">Fait <span class="sort-arrow" id="arr-faite">↕</span></th>
        <th class="td-del"></th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL CRÉATION -->
<div class="modal-wrap" id="modalWrap">
  <div class="modal">
    <div class="modal-header">
      <h2>Nouvelle activité</h2>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row-2">
        <div class="form-group">
          <label>Type <span style="color:#de350b">*</span></label>
          <select id="f-type"><option value="">— Choisir —</option><option value="appel">📞 Appel</option><option value="rdv">🤝 RDV</option><option value="email">✉️ Email</option><option value="tache">✅ Tâche</option><option value="autre">Autre</option></select>
        </div>
        <div class="form-group">
          <label>Date <span style="color:#de350b">*</span></label>
          <input type="date" id="f-date" />
        </div>
      </div>
      <div class="form-row-1"><div class="form-group"><label>Sujet</label><input type="text" id="f-sujet" placeholder="Ex : Appel de qualification Dupont" /></div></div>
      <div class="form-row-2">
        <div class="form-group"><label>Heure</label><input type="time" id="f-heure" /></div>
        <div class="form-group"></div>
      </div>
      <div class="form-row-1"><div class="form-group"><label>Deal associé</label><select id="f-deal"><option value="">— Aucun —</option></select></div></div>
      <div class="form-row-1"><div class="form-group"><label>Entreprise associée</label><select id="f-entreprise"><option value="">— Aucune —</option></select></div></div>
      <div class="form-row-1"><div class="form-group"><label>Contact associé</label><select id="f-contact"><option value="">— Aucun —</option></select></div></div>
      <div class="form-row-1"><div class="form-group"><label>Note</label><textarea id="f-note" placeholder="Contexte, points à aborder…"></textarea></div></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveActivite()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- DRAWER EXÉCUTION -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div style="flex:1;min-width:0;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;" id="drawer-pill-wrap"></div>
      <h2 id="drawer-titre" style="font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">—</h2>
    </div>
    <div class="drawer-actions"><button class="btn-close" onclick="closeDrawer()">×</button></div>
  </div>
  <div id="drawer-lien" style="padding:8px 24px;border-bottom:1px solid #e0e0e0;background:#f4f5f7;font-size:12px;display:none;"></div>
  <div class="drawer-body" style="display:flex;flex-direction:column;gap:0;padding:0;">
    <div style="padding:16px 24px;border-bottom:1px solid #f0f0f0;flex:1;overflow-y:auto;max-height:240px;">
      <div style="font-size:11px;font-weight:600;color:#6b778c;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">Historique</div>
      <div id="drawer-notes"><span style="font-size:13px;color:#6b778c;">Chargement…</span></div>
    </div>
    <div style="padding:16px 24px;border-bottom:1px solid #f0f0f0;">
      <div style="font-size:11px;font-weight:600;color:#6b778c;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Nouvelle note</div>
      <div class="form-group"><textarea id="drawer-note-input" placeholder="Points abordés, décisions, prochaines étapes…" style="min-height:80px;"></textarea></div>
    </div>
    <div style="padding:16px 24px;display:flex;flex-direction:column;gap:8px;">
      <button class="btn-primary" style="width:100%;text-align:center;" onclick="markDoneAndNext()">✓ Marquer faite + créer la suivante</button>
      <button class="btn-secondary" style="width:100%;text-align:center;" onclick="saveNoteOnly()">Enregistrer la note uniquement</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let allActivites = [];
  let currentPeriod = 'retard', currentType = 'all', currentView = 'table';
  let sortCol = 'date', sortAsc = true, drawerActivite = null;

  function todayStr() { return new Date().toISOString().split('T')[0]; }
  function startOfWeek() { const d=new Date(),day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));return d.toISOString().split('T')[0]; }
  function endOfWeek() { const d=new Date(),day=d.getDay();d.setDate(d.getDate()+(day===0?0:7-day));return d.toISOString().split('T')[0]; }
  function fmtDate(s) { if(!s)return'';return new Date(s+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'}); }

  async function load() {
    const {data,error}=await supabase.from('activites').select('*,deals(id,titre),entreprises(id,nom),contacts(id,prenom,nom)').order('date_echeance',{ascending:true});
    if(error){showToast('Erreur chargement : '+error.message,true);return;}
    allActivites=data||[]; refreshBadge(); render();
  }

  function refreshBadge() {
    const n=allActivites.filter(a=>!a.faite&&a.date_echeance&&a.date_echeance<todayStr()).length;
    const el=document.getElementById('badge-retard');
    el.textContent=n; el.classList.toggle('hidden',n===0);
  }

  function getFiltered() {
    const t=todayStr(),sow=startOfWeek(),eow=endOfWeek();
    return allActivites.filter(a=>{
      if(currentType!=='all'&&a.type!==currentType)return false;
      if(currentPeriod==='retard')return !a.faite&&a.date_echeance&&a.date_echeance<t;
      if(currentPeriod==='today')return a.date_echeance===t;
      if(currentPeriod==='week')return a.date_echeance>=sow&&a.date_echeance<=eow;
      return true;
    });
  }

  function render() {
    const list=getFiltered();
    const area=document.getElementById('listArea');
    document.getElementById('countLabel').textContent=list.length+' activité'+(list.length>1?'s':'');
    if(!list.length){area.innerHTML='<div class="empty-state">Aucune activité pour cette période.</div>';return;}
    if(currentView==='table'){renderTable();return;}
    if(currentPeriod==='all'||currentPeriod==='week'){
      const groups={};
      list.forEach(a=>{const k=a.date_echeance||'Sans date';(groups[k]=groups[k]||[]).push(a);});
      area.innerHTML=Object.entries(groups).map(([date,items])=>{
        const late=date!=='Sans date'&&date<todayStr();
        return'<div class="group-label '+(late?'late':'')+'">'+( date==='Sans date'?'Sans date':fmtDate(date))+(late?' — En retard':'')+'</div>'+items.map(cardHTML).join('');
      }).join('');
    } else { area.innerHTML=list.map(cardHTML).join(''); }
  }

  function cardHTML(a) {
    const late=!a.faite&&a.date_echeance&&a.date_echeance<todayStr();
    const pillCls={appel:'pill-appel',rdv:'pill-rdv',email:'pill-email',tache:'pill-tache'}[a.type]||'pill-autre';
    const typeLabel={appel:'📞 Appel',rdv:'🤝 RDV',email:'✉️ Email',tache:'✅ Tâche',autre:'Autre'}[a.type]||(a.type||'Autre');
    const dealLink=a.deals?`<a href="deals.html">${esc(a.deals.titre)}</a>`:'';
    const entSpan=a.entreprises?`<span>${esc(a.entreprises.nom)}</span>`:'';
    const ctSpan=a.contacts?`<span>${esc([a.contacts.prenom,a.contacts.nom].filter(Boolean).join(' '))}</span>`:'';
    const meta=[dealLink,entSpan,ctSpan].filter(Boolean).join(' · ')||'<span style="color:#c1c7d0">Aucun lien</span>';
    const noteSnip=a.note?` · <span>${esc(a.note.slice(0,55))}${a.note.length>55?'…':''}</span>`:'';
    return`<div class="act-card ${a.faite?'done':''} ${late?'late':''}" id="card-${a.id}">
      <input type="checkbox" class="act-check" ${a.faite?'checked':''} onchange="toggleFait('${a.id}',this.checked)" />
      <span class="type-pill ${pillCls}">${typeLabel}</span>
      <div class="act-body"><div class="act-sujet">${esc(a.sujet||'(sans sujet)')}</div><div class="act-meta">${meta}${noteSnip}</div></div>
      <div class="act-date ${late?'late':''}">${fmtDate(a.date_echeance)}${a.heure_echeance?'<br>'+a.heure_echeance.slice(0,5):''}</div>
      <button class="btn-del" onclick="deleteActivite('${a.id}')">✕</button>
    </div>`;
  }

  async function toggleFait(id,checked) {
    const card=document.getElementById('card-'+id); card.classList.toggle('done',checked);
    const {error}=await supabase.from('activites').update({faite:checked,date_fait:checked?new Date().toISOString():null}).eq('id',id);
    if(error){showToast('Erreur : '+error.message,true);card.classList.toggle('done',!checked);return;}
    const idx=allActivites.findIndex(a=>a.id===id); if(idx!==-1)allActivites[idx].faite=checked;
    refreshBadge();
    if(currentPeriod==='retard'&&checked)setTimeout(()=>render(),600);
    showToast(checked?'Activité faite ✓':'Activité réouverte');
  }

  async function deleteActivite(id) {
    if(!confirm('Supprimer cette activité ?'))return;
    const {error}=await supabase.from('activites').delete().eq('id',id);
    if(error){showToast('Erreur : '+error.message,true);return;}
    allActivites=allActivites.filter(a=>a.id!==id); refreshBadge(); render(); showToast('Activité supprimée');
  }

  function setPeriod(p){currentPeriod=p;document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',b.dataset.period===p));render();}
  function setType(t){currentType=t;document.querySelectorAll('.tfbtn').forEach(b=>b.classList.toggle('active',b.dataset.type===t));render();}

  function setView(v) {
    currentView=v;
    document.getElementById('btn-cards').classList.toggle('active',v==='cards');
    document.getElementById('btn-table').classList.toggle('active',v==='table');
    document.getElementById('listArea').classList.toggle('hide',v==='table');
    document.getElementById('tableArea').classList.toggle('show',v==='table');
    if(v==='table')renderTable();
  }

  function sortBy(col) {
    if(sortCol===col){sortAsc=!sortAsc;}else{sortCol=col;sortAsc=true;}
    ['type','sujet','lien','date','heure','faite'].forEach(c=>{
      const el=document.getElementById('arr-'+c); if(!el)return;
      el.classList.toggle('active',c===sortCol);
      el.textContent=c===sortCol?(sortAsc?'↑':'↓'):'↕';
    });
    renderTable();
  }

  function getSorted(list) {
    return [...list].sort((a,b)=>{
      let va,vb;
      if(sortCol==='type'){va=a.type||'';vb=b.type||'';}
      else if(sortCol==='sujet'){va=a.sujet||'';vb=b.sujet||'';}
      else if(sortCol==='lien'){va=(a.deals?.titre||a.entreprises?.nom||'');vb=(b.deals?.titre||b.entreprises?.nom||'');}
      else if(sortCol==='date'){va=a.date_echeance||'';vb=b.date_echeance||'';}
      else if(sortCol==='heure'){va=a.heure_echeance||'';vb=b.heure_echeance||'';}
      else if(sortCol==='faite'){va=a.faite?1:0;vb=b.faite?1:0;}
      if(va<vb)return sortAsc?-1:1; if(va>vb)return sortAsc?1:-1; return 0;
    });
  }

  function renderTable() {
    const list=getSorted(getFiltered()); const tbody=document.getElementById('tableBody');
    if(!list.length){tbody.innerHTML=`<tr><td colspan="8" style="text-align:center;padding:40px;color:#6b778c;font-size:13px">Aucune activité pour cette période.</td></tr>`;return;}
    const typeLabel={appel:'📞 Appel',rdv:'🤝 RDV',email:'✉️ Email',tache:'✅ Tâche',autre:'Autre'};
    const pillCls={appel:'pill-appel',rdv:'pill-rdv',email:'pill-email',tache:'pill-tache'};
    const t=todayStr();
    tbody.innerHTML=list.map(a=>{
      const late=!a.faite&&a.date_echeance&&a.date_echeance<t;
      const lien=[a.deals?esc(a.deals.titre):'',a.entreprises?esc(a.entreprises.nom):'',a.contacts?esc([a.contacts.prenom,a.contacts.nom].filter(Boolean).join(' ')):''
      ].filter(Boolean).join(' · ')||'<span style="color:#c1c7d0">—</span>';
      return`<tr style="cursor:pointer" onclick="openDrawer('${a.id}')">
        <td class="td-check"><input type="checkbox" ${a.faite?'checked':''} onchange="toggleFait('${a.id}',this.checked)" /></td>
        <td><span class="type-pill ${pillCls[a.type]||'pill-autre'}">${typeLabel[a.type]||a.type||'Autre'}</span></td>
        <td class="td-sujet">${a.sujet?esc(a.sujet):'<span class="td-muted">—</span>'}</td>
        <td class="td-muted">${lien}</td>
        <td class="${late?'td-late':'td-muted'}">${fmtDate(a.date_echeance)||'—'}</td>
        <td class="td-muted">${a.heure_echeance?a.heure_echeance.slice(0,5):'—'}</td>
        <td style="text-align:center">${a.faite?'✓':''}</td>
        <td class="td-del"><button class="btn-del" onclick="deleteActivite('${a.id}')">✕</button></td>
      </tr>`;
    }).join('');
  }

  const PILL_CSS={appel:'pill-appel',rdv:'pill-rdv',email:'pill-email',tache:'pill-tache'};
  const PILL_LBL={appel:'📞 Appel',rdv:'🤝 RDV',email:'✉️ Email',tache:'✅ Tâche',autre:'Autre'};

  async function openDrawer(id) {
    drawerActivite=allActivites.find(a=>a.id===id); if(!drawerActivite)return;
    const a=drawerActivite;
    const pillCls=PILL_CSS[a.type]||'pill-autre', pillLbl=PILL_LBL[a.type]||a.type||'Autre';
    document.getElementById('drawer-pill-wrap').innerHTML=`<span class="type-pill ${pillCls}">${pillLbl}</span>`+(a.date_echeance?`<span style="font-size:12px;color:#6b778c;">${fmtDate(a.date_echeance)}${a.heure_echeance?' '+a.heure_echeance.slice(0,5):''}</span>`:'');
    document.getElementById('drawer-titre').textContent=a.sujet||'(sans sujet)';
    const lienEl=document.getElementById('drawer-lien');
    const liens=[];
    if(a.deals)liens.push(`<a href="deals.html" style="color:#0052cc;text-decoration:none;font-weight:500;">→ Deal : ${esc(a.deals.titre)}</a>`);
    if(a.entreprises)liens.push(`<span style="color:#172b4d;font-weight:500;">${esc(a.entreprises.nom)}</span>`);
    if(a.contacts)liens.push(`<span style="color:#172b4d;">${esc([a.contacts.prenom,a.contacts.nom].filter(Boolean).join(' '))}</span>`);
    if(liens.length){lienEl.innerHTML=liens.join(' &nbsp;·&nbsp; ');lienEl.style.display='block';}else{lienEl.style.display='none';}
    document.getElementById('drawer-note-input').value='';
    document.getElementById('drawer-notes').innerHTML='<span style="font-size:13px;color:#6b778c;">Chargement…</span>';
    const filters=[];
    if(a.deal_id)filters.push(`deal_id.eq.${a.deal_id}`);
    if(a.contact_id)filters.push(`contact_id.eq.${a.contact_id}`);
    if(a.entreprise_id)filters.push(`entreprise_id.eq.${a.entreprise_id}`);
    let notes=[];
    if(filters.length){const{data}=await supabase.from('notes').select('*').or(filters.join(',')).order('created_at',{ascending:false}).limit(10);notes=data||[];}
    const notesEl=document.getElementById('drawer-notes');
    if(!notes.length){notesEl.innerHTML='<span style="font-size:13px;color:#6b778c;">Aucune note pour ce dossier.</span>';}
    else{notesEl.innerHTML=notes.map(n=>{const d=new Date(n.created_at).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});return`<div style="margin-bottom:10px;"><div style="font-size:11px;color:#6b778c;margin-bottom:3px;">${d}</div><div style="font-size:13px;color:#172b4d;background:#f4f5f7;border-radius:4px;padding:8px 10px;border-left:2px solid #dfe1e6;line-height:1.5;">${esc(n.contenu||'')}</div></div>`;}).join('');}
    document.getElementById('overlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
  }

  function closeDrawer(){document.getElementById('overlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');drawerActivite=null;}

  async function saveNoteOnly() {
    const contenu=document.getElementById('drawer-note-input').value.trim();
    if(!contenu){showToast('La note est vide',true);return;}
    const a=drawerActivite;
    const{error}=await supabase.from('notes').insert([{contenu,deal_id:a.deal_id||null,contact_id:a.contact_id||null,entreprise_id:a.entreprise_id||null}]);
    if(error){showToast('Erreur : '+error.message,true);return;}
    showToast('Note enregistrée ✓'); openDrawer(a.id);
  }

  async function markDoneAndNext() {
    const contenu=document.getElementById('drawer-note-input').value.trim(); const a=drawerActivite;
    if(contenu){const{error:ne}=await supabase.from('notes').insert([{contenu,deal_id:a.deal_id||null,contact_id:a.contact_id||null,entreprise_id:a.entreprise_id||null}]);if(ne){showToast('Erreur note : '+ne.message,true);return;}}
    const{error}=await supabase.from('activites').update({faite:true,date_fait:new Date().toISOString()}).eq('id',a.id);
    if(error){showToast('Erreur : '+error.message,true);return;}
    const idx=allActivites.findIndex(x=>x.id===a.id); if(idx!==-1)allActivites[idx].faite=true;
    refreshBadge(); render(); showToast('Activité faite ✓'); closeDrawer();
    await openModal({type:a.type,deal_id:a.deal_id,entreprise_id:a.entreprise_id,contact_id:a.contact_id});
  }

  async function openModal(prefill={}) {
    const [{data:deals},{data:ents},{data:cts}]=await Promise.all([
      supabase.from('deals').select('id,titre').eq('statut','ouvert').order('titre'),
      supabase.from('entreprises').select('id,nom').order('nom'),
      supabase.from('contacts').select('id,prenom,nom').order('nom')
    ]);
    document.getElementById('f-deal').innerHTML='<option value="">— Aucun —</option>'+(deals||[]).map(d=>`<option value="${d.id}">${esc(d.titre)}</option>`).join('');
    document.getElementById('f-entreprise').innerHTML='<option value="">— Aucune —</option>'+(ents||[]).map(e=>`<option value="${e.id}">${esc(e.nom)}</option>`).join('');
    document.getElementById('f-contact').innerHTML='<option value="">— Aucun —</option>'+(cts||[]).map(c=>`<option value="${c.id}">${esc([c.prenom,c.nom].filter(Boolean).join(' '))}</option>`).join('');
    document.getElementById('f-date').value=todayStr();
    if(prefill.type)document.getElementById('f-type').value=prefill.type;
    if(prefill.deal_id)document.getElementById('f-deal').value=prefill.deal_id;
    if(prefill.entreprise_id)document.getElementById('f-entreprise').value=prefill.entreprise_id;
    if(prefill.contact_id)document.getElementById('f-contact').value=prefill.contact_id;
    document.getElementById('modalWrap').classList.add('open');
  }

  function closeModal(){document.getElementById('modalWrap').classList.remove('open');['f-type','f-sujet','f-heure','f-deal','f-entreprise','f-contact','f-note'].forEach(id=>{document.getElementById(id).value='';});}

  async function saveActivite() {
    const type=document.getElementById('f-type').value, sujet=document.getElementById('f-sujet').value.trim();
    const date=document.getElementById('f-date').value, heure=document.getElementById('f-heure').value;
    const dealId=document.getElementById('f-deal').value, entId=document.getElementById('f-entreprise').value;
    const contactId=document.getElementById('f-contact').value, note=document.getElementById('f-note').value.trim();
    if(!type||!date){showToast('Type et date sont requis',true);return;}
    const{data,error}=await supabase.from('activites').insert([{type,sujet:sujet||null,date_echeance:date,heure_echeance:heure||null,deal_id:dealId||null,entreprise_id:entId||null,contact_id:contactId||null,note:note||null,faite:false}]).select('*,deals(id,titre),entreprises(id,nom),contacts(id,prenom,nom)');
    if(error){showToast('Erreur : '+error.message,true);return;}
    allActivites.push(data[0]); allActivites.sort((a,b)=>(a.date_echeance||'').localeCompare(b.date_echeance||''));
    closeModal(); refreshBadge(); render(); showToast('Activité créée ✓');
  }

  document.getElementById('modalWrap').addEventListener('click',e=>{if(e.target===document.getElementById('modalWrap'))closeModal();});

  function showToast(msg,isError=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isError?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  load();
</script>
</body>
</html>
