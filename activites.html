<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activités — ERC CRM</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .period-tabs { display:flex;gap:2px;padding:0 24px;border-bottom:1px solid #e0e6f0;background:#fff; }
    .ptab { padding:10px 16px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#6b778c;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px; }
    .ptab:hover { color:#172b4d; }
    .ptab.active { color:#0052cc;border-bottom-color:#0052cc;font-weight:600; }
    .ptab-badge { background:#de350b;color:#fff;border-radius:20px;font-size:10px;font-weight:700;padding:1px 6px;line-height:1.4; }
    .ptab-badge.hidden { display:none; }

    .type-filters { padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;background:#f4f5f7;border-bottom:1px solid #e0e6f0; }
    .tfbtn { border:1px solid #dfe1e6;background:#fff;border-radius:20px;padding:4px 13px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:#6b778c;cursor:pointer;transition:all .15s; }
    .tfbtn:hover { border-color:#0052cc;color:#0052cc; }
    .tfbtn.active { background:#0052cc;border-color:#0052cc;color:#fff; }

    .list-area { padding:16px 24px 40px;flex:1;overflow-y:auto; }
    .group-label { font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6b778c;margin:20px 0 8px; }
    .group-label:first-child { margin-top:0; }
    .group-label.late { color:#de350b; }

    .act-card { background:#fff;border:1px solid #dfe1e6;border-radius:6px;padding:12px 16px;display:flex;align-items:center;gap:14px;margin-bottom:6px;cursor:pointer;transition:box-shadow .15s,border-color .15s; }
    .act-card:hover { border-color:#0052cc;box-shadow:0 2px 8px rgba(0,0,0,.07); }
    .act-card.done { opacity:.5; }
    .act-card.late { border-left:3px solid #de350b; }
    .act-check { width:18px;height:18px;cursor:pointer;accent-color:#0052cc;flex-shrink:0; }

    .type-pill { flex-shrink:0;border-radius:4px;padding:3px 9px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap; }
    .pill-appel { background:#deebff;color:#0052cc; }
    .pill-rdv   { background:#e3fcef;color:#006644; }
    .pill-email { background:#fffae6;color:#974f0c; }
    .pill-tache { background:#eae6ff;color:#403294; }
    .pill-autre { background:#f4f5f7;color:#6b778c; }

    .act-body { flex:1;min-width:0; }
    .act-sujet { font-size:14px;font-weight:600;color:#172b4d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px; }
    .act-meta { font-size:12px;color:#6b778c;display:flex;gap:10px;flex-wrap:wrap; }
    .act-meta a { color:#0052cc;text-decoration:none; }
    .act-date { font-size:12px;color:#6b778c;text-align:right;white-space:nowrap;flex-shrink:0;line-height:1.6; }
    .act-date.late { color:#de350b;font-weight:600; }

    .btn-del { background:none;border:none;cursor:pointer;color:#c1c7d0;font-size:15px;padding:0 4px;flex-shrink:0;line-height:1;transition:color .15s; }
    .btn-del:hover { color:#de350b; }

    .view-toggle { display:flex;border:1px solid #dfe1e6;border-radius:4px;overflow:hidden;margin-left:auto; }
    .view-btn { width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:#fff;border:none;cursor:pointer;color:#6b778c;transition:background .15s,color .15s; }
    .view-btn.active { background:#172b4d;color:#fff; }
    .view-btn:hover:not(.active) { background:#f4f5f7; }

    .table-area { padding:16px 24px 40px;flex:1;overflow-y:auto;display:none; }
    .table-area.show { display:block; }
    .list-area.hide { display:none; }

    .act-table-wrap { background:#fff;border-radius:8px;border:1px solid #e8eaf0;overflow:hidden; }
    .act-table-wrap table { width:100%;border-collapse:collapse; }
    .act-table-wrap thead { background:#f8f9fc;border-bottom:1px solid #e8eaf0; }
    .act-table-wrap th { text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:#6b7494;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;cursor:pointer;user-select:none; }
    .act-table-wrap th:hover { color:#172b4d; }
    .sort-arrow { margin-left:4px;opacity:.4;font-size:10px; }
    .sort-arrow.active { opacity:1;color:#0052cc; }
    .act-table-wrap tbody tr { border-bottom:1px solid #f0f2f7;transition:background .1s;cursor:pointer; }
    .act-table-wrap tbody tr:last-child { border-bottom:none; }
    .act-table-wrap tbody tr:hover { background:#f0f5ff; }
    .act-table-wrap td { padding:10px 16px;font-size:13px;color:#172b4d;vertical-align:middle; }
    .td-sujet { font-weight:500; }
    .td-muted { color:#6b778c;font-size:12px; }
    .td-check { width:36px;text-align:center; }
    .td-check input { accent-color:#0052cc;cursor:pointer;width:16px;height:16px; }
    .td-del { width:36px;text-align:center; }
    .td-late { color:#de350b;font-weight:600; }

    /* ── MODAL UNIFIÉ ── */
    .modal-wrap { position:fixed;inset:0;background:rgba(9,30,66,.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:40px; }
    .modal-wrap.open { display:flex; }
    .modal { background:#fff;border-radius:10px;width:540px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);display:flex;flex-direction:column; }
    .modal-header { padding:18px 24px;border-bottom:1px solid #dfe1e6;display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
    .modal-header h2 { font-size:16px;font-weight:600;color:#172b4d; }
    .modal-body { padding:20px 24px;flex:1; }
    .modal-footer { padding:14px 24px;border-top:1px solid #dfe1e6;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0; }

    .form-row-2 { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px; }
    .form-row-1 { margin-bottom:12px; }
    .form-group { display:flex;flex-direction:column;gap:4px; }
    .form-group label { font-size:12px;font-weight:600;color:#6b778c; }
    .form-group input,.form-group select,.form-group textarea { border:1px solid #dde1ec;border-radius:6px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:#172b4d;background:#fff;outline:none;transition:border-color .15s;width:100%; }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:#0052cc; }
    .form-group textarea { resize:vertical;min-height:64px; }

    /* Fait checkbox inline */
    .faite-row { display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 12px;background:#f8f9fc;border-radius:6px;border:1px solid #e8eaf0; }
    .faite-row label { font-size:13px;font-weight:500;color:#172b4d;cursor:pointer;display:flex;align-items:center;gap:8px;margin:0; }
    .faite-row input[type=checkbox] { width:16px;height:16px;accent-color:#0052cc;cursor:pointer;flex-shrink:0; }

    /* Séparateur section notes */
    .section-sep { font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ba3b8;margin:16px 0 10px;padding-top:14px;border-top:1px solid #e8eaf0; }

    /* Notes dans le modal */
    .note-item-m { padding:8px 0;border-bottom:1px solid #f0f2f7; }
    .note-item-m:last-child { border-bottom:none; }
    .note-d-m { font-size:11px;color:#9ba3b8;margin-bottom:3px; }
    .note-c-m { font-size:13px;line-height:1.5;background:#f8f9fc;border-radius:6px;padding:7px 10px;border-left:2px solid #dde1ec; }
    .notes-empty { font-size:13px;color:#9ba3b8;text-align:center;padding:12px 0; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <h1>ERC CRM</h1>
    <nav class="topbar-nav">
      <a href="contacts.html">Contacts</a>
      <a href="entreprises.html">Entreprises</a>
      <a href="deals.html">Deals</a>
      <a href="activites.html" class="active">Activités</a>
    </nav>
  </div>
  <button class="btn-primary" onclick="openModal()">+ Nouvelle activité</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <h1 style="font-size:18px;font-weight:600;color:#172b4d;white-space:nowrap;margin-right:4px">Activités</h1>
  <input class="search-input" type="text" id="searchInput" placeholder="Rechercher sujet, deal, contact…" oninput="render()" style="width:240px">
  <span class="count-label" id="countLabel"></span>
  <div style="flex:1"></div>
  <div class="view-toggle">
    <button class="view-btn" id="btn-cards" onclick="setView('cards')" title="Vue cartes">
      <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="1" width="5" height="5" rx=".6"/><rect x="8" y="1" width="5" height="5" rx=".6"/>
        <rect x="1" y="8" width="5" height="5" rx=".6"/><rect x="8" y="8" width="5" height="5" rx=".6"/>
      </svg>
    </button>
    <button class="view-btn active" id="btn-table" onclick="setView('table')" title="Vue tableau">
      <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <line x1="1" y1="3.5" x2="13" y2="3.5"/><line x1="1" y1="7" x2="13" y2="7"/>
        <line x1="1" y1="10.5" x2="13" y2="10.5"/>
      </svg>
    </button>
  </div>
</div>

<!-- TABS PÉRIODE -->
<div class="period-tabs">
  <button class="ptab" data-period="retard" onclick="setPeriod('retard')">En retard <span class="ptab-badge hidden" id="badge-retard">0</span></button>
  <button class="ptab" data-period="today" onclick="setPeriod('today')">Aujourd'hui</button>
  <button class="ptab" data-period="week" onclick="setPeriod('week')">Cette semaine</button>
  <button class="ptab active" data-period="all" onclick="setPeriod('all')">Toutes</button>
</div>

<!-- FILTRES TYPE -->
<div class="type-filters">
  <button class="tfbtn active" data-type="all" onclick="setType('all')">Tous types</button>
  <button class="tfbtn" data-type="appel" onclick="setType('appel')">📞 Appel</button>
  <button class="tfbtn" data-type="rdv" onclick="setType('rdv')">🤝 RDV</button>
  <button class="tfbtn" data-type="email" onclick="setType('email')">✉️ Email</button>
  <button class="tfbtn" data-type="tache" onclick="setType('tache')">✅ Tâche</button>
</div>

<!-- VUE CARTES -->
<div class="list-area hide" id="listArea"></div>

<!-- VUE TABLEAU -->
<div class="table-area show" id="tableArea">
  <div class="act-table-wrap">
    <table>
      <thead><tr>
        <th class="td-check"></th>
        <th onclick="sortBy('type')">Type <span class="sort-arrow" id="arr-type">↕</span></th>
        <th onclick="sortBy('sujet')">Sujet <span class="sort-arrow" id="arr-sujet">↕</span></th>
        <th onclick="sortBy('lien')">Lié à <span class="sort-arrow" id="arr-lien">↕</span></th>
        <th onclick="sortBy('date')">Date <span class="sort-arrow active" id="arr-date">↑</span></th>
        <th onclick="sortBy('heure')">Heure <span class="sort-arrow" id="arr-heure">↕</span></th>
        <th onclick="sortBy('faite')">Fait <span class="sort-arrow" id="arr-faite">↕</span></th>
        <th class="td-del"></th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL UNIFIÉ (création + modification) -->
<div class="modal-wrap" id="modalWrap" onclick="handleModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Nouvelle activité</h2>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">

      <div class="form-row-2">
        <div class="form-group">
          <label>Type <span style="color:#de350b">*</span></label>
          <select id="f-type">
            <option value="">— Choisir —</option>
            <option value="appel">📞 Appel</option>
            <option value="rdv">🤝 RDV</option>
            <option value="email">✉️ Email</option>
            <option value="tache">✅ Tâche</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date <span style="color:#de350b">*</span></label>
          <input type="date" id="f-date" />
        </div>
      </div>

      <div class="form-row-1">
        <div class="form-group">
          <label>Sujet</label>
          <input type="text" id="f-sujet" placeholder="Ex : Appel de qualification Dupont" />
        </div>
      </div>

      <div class="form-row-2">
        <div class="form-group">
          <label>Heure</label>
          <input type="time" id="f-heure" />
        </div>
        <div class="form-group">
          <label>Lieu / Durée</label>
          <input type="text" id="f-lieu" placeholder="Ex : Visio, 1h" />
        </div>
      </div>

      <div class="form-row-1">
        <div class="form-group">
          <label>Deal associé</label>
          <select id="f-deal"><option value="">— Aucun —</option></select>
        </div>
      </div>
      <div class="form-row-1">
        <div class="form-group">
          <label>Entreprise associée</label>
          <select id="f-entreprise"><option value="">— Aucune —</option></select>
        </div>
      </div>
      <div class="form-row-1">
        <div class="form-group">
          <label>Contact associé</label>
          <select id="f-contact"><option value="">— Aucun —</option></select>
        </div>
      </div>

      <!-- Section "Faite" visible en modification uniquement -->
      <div id="faite-section" style="display:none">
        <div class="faite-row">
          <label for="f-faite">
            <input type="checkbox" id="f-faite" />
            Activité réalisée
          </label>
        </div>
      </div>

      <div class="form-row-1">
        <div class="form-group">
          <label>Note / Compte-rendu</label>
          <textarea id="f-note" placeholder="Contexte, points abordés, décisions…"></textarea>
        </div>
      </div>

      <!-- Historique des notes (visible en modification uniquement) -->
      <div id="notes-history-section" style="display:none">
        <div class="section-sep">Historique des notes</div>
        <div id="notes-history-list"></div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btn-delete-act" style="display:none;margin-right:auto" onclick="deleteFromModal()">Supprimer</button>
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" id="btn-save-act" onclick="saveModal()">Créer l'activité</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let allActivites = [];
  let currentPeriod = 'all', currentType = 'all', currentView = 'table';
  let sortCol = 'date', sortAsc = true;
  let modalMode = 'create', editingId = null;

  // ── Dates
  function todayStr() { return new Date().toISOString().split('T')[0]; }
  function startOfWeek() { const d=new Date(),day=d.getDay();d.setDate(d.getDate()-(day===0?6:day-1));return d.toISOString().split('T')[0]; }
  function endOfWeek() { const d=new Date(),day=d.getDay();d.setDate(d.getDate()+(day===0?0:7-day));return d.toISOString().split('T')[0]; }
  function fmtDate(s) { if(!s)return'';return new Date(s+'T00:00:00').toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'}); }
  function fmtDateHeure(iso) { if(!iso)return'';const dt=new Date(iso);return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }

  // ── Chargement
  async function load() {
    const {data,error}=await supabase.from('activites')
      .select('*,deals(id,titre),entreprises(id,nom),contacts(id,prenom,nom)')
      .order('date_echeance',{ascending:true});
    if(error){showToast('Erreur chargement : '+error.message,true);return;}
    allActivites=data||[]; refreshBadge(); render();
  }

  function refreshBadge() {
    const n=allActivites.filter(a=>!a.faite&&a.date_echeance&&a.date_echeance<todayStr()).length;
    const el=document.getElementById('badge-retard');
    el.textContent=n; el.classList.toggle('hidden',n===0);
  }

  // ── Filtrage
  function getFiltered() {
    const t=todayStr(),sow=startOfWeek(),eow=endOfWeek();
    const q=(document.getElementById('searchInput')?.value||'').toLowerCase().trim();
    return allActivites.filter(a=>{
      if(currentType!=='all'&&a.type!==currentType)return false;
      if(currentPeriod==='retard')return !a.faite&&a.date_echeance&&a.date_echeance<t;
      if(currentPeriod==='today')return a.date_echeance===t;
      if(currentPeriod==='week')return a.date_echeance>=sow&&a.date_echeance<=eow;
      if(q){
        const sujet=(a.sujet||'').toLowerCase();
        const deal=(a.deals?.titre||'').toLowerCase();
        const ct=([a.contacts?.prenom,a.contacts?.nom].filter(Boolean).join(' ')).toLowerCase();
        const ent=(a.entreprises?.nom||'').toLowerCase();
        return sujet.includes(q)||deal.includes(q)||ct.includes(q)||ent.includes(q);
      }
      return true;
    });
  }

  // ── Rendu
  function render() {
    const list=getFiltered();
    document.getElementById('countLabel').textContent=list.length+' activité'+(list.length>1?'s':'');
    if(currentView==='table'){renderTable();return;}
    renderCards(list);
  }

  function renderCards(list) {
    const area=document.getElementById('listArea');
    if(!list.length){area.innerHTML='<div class="empty-state">Aucune activité pour cette période.</div>';return;}
    if(currentPeriod==='all'||currentPeriod==='week'){
      const groups={};
      list.forEach(a=>{const k=a.date_echeance||'Sans date';(groups[k]=groups[k]||[]).push(a);});
      area.innerHTML=Object.entries(groups).map(([date,items])=>{
        const late=date!=='Sans date'&&date<todayStr();
        return'<div class="group-label '+(late?'late':'')+'">'+( date==='Sans date'?'Sans date':fmtDate(date))+(late?' — En retard':'')+'</div>'+items.map(cardHTML).join('');
      }).join('');
    } else { area.innerHTML=list.map(cardHTML).join(''); }
  }

  function cardHTML(a) {
    const late=!a.faite&&a.date_echeance&&a.date_echeance<todayStr();
    const pillCls={appel:'pill-appel',rdv:'pill-rdv',email:'pill-email',tache:'pill-tache'}[a.type]||'pill-autre';
    const typeLabel={appel:'📞 Appel',rdv:'🤝 RDV',email:'✉️ Email',tache:'✅ Tâche',autre:'Autre'}[a.type]||(a.type||'Autre');
    const dealLink=a.deals?`<a href="deals.html">${esc(a.deals.titre)}</a>`:'';
    const entSpan=a.entreprises?`<span>${esc(a.entreprises.nom)}</span>`:'';
    const ctSpan=a.contacts?`<span>${esc([a.contacts.prenom,a.contacts.nom].filter(Boolean).join(' '))}</span>`:'';
    const meta=[dealLink,entSpan,ctSpan].filter(Boolean).join(' · ')||'<span style="color:#c1c7d0">Aucun lien</span>';
    return`<div class="act-card ${a.faite?'done':''} ${late?'late':''}" onclick="openModal({},event,'${a.id}')">
      <input type="checkbox" class="act-check" ${a.faite?'checked':''} onchange="toggleFait('${a.id}',this.checked)" onclick="event.stopPropagation()" />
      <span class="type-pill ${pillCls}">${typeLabel}</span>
      <div class="act-body"><div class="act-sujet">${esc(a.sujet||'(sans sujet)')}</div><div class="act-meta">${meta}</div></div>
      <div class="act-date ${late?'late':''}">${fmtDate(a.date_echeance)}${a.heure_echeance?'<br>'+a.heure_echeance.slice(0,5):''}</div>
      <button class="btn-del" onclick="event.stopPropagation();deleteActivite('${a.id}')" title="Supprimer">✕</button>
    </div>`;
  }

  async function toggleFait(id,checked) {
    const {error}=await supabase.from('activites').update({faite:checked,date_fait:checked?new Date().toISOString():null}).eq('id',id);
    if(error){showToast('Erreur : '+error.message,true);return;}
    const idx=allActivites.findIndex(a=>a.id===id);if(idx!==-1)allActivites[idx].faite=checked;
    refreshBadge();
    if(currentPeriod==='retard'&&checked)setTimeout(()=>render(),600);
    showToast(checked?'Activité faite ✓':'Activité réouverte');
  }

  async function deleteActivite(id) {
    if(!confirm('Supprimer cette activité ?'))return;
    const {error}=await supabase.from('activites').delete().eq('id',id);
    if(error){showToast('Erreur : '+error.message,true);return;}
    allActivites=allActivites.filter(a=>a.id!==id);refreshBadge();render();showToast('Activité supprimée');
  }

  function setPeriod(p){currentPeriod=p;document.querySelectorAll('.ptab').forEach(b=>b.classList.toggle('active',b.dataset.period===p));render();}
  function setType(t){currentType=t;document.querySelectorAll('.tfbtn').forEach(b=>b.classList.toggle('active',b.dataset.type===t));render();}

  function setView(v) {
    currentView=v;
    document.getElementById('btn-cards').classList.toggle('active',v==='cards');
    document.getElementById('btn-table').classList.toggle('active',v==='table');
    document.getElementById('listArea').classList.toggle('hide',v==='table');
    document.getElementById('tableArea').classList.toggle('show',v==='table');
    if(v==='table')renderTable();
  }

  // ── Tri tableau
  function sortBy(col) {
    if(sortCol===col){sortAsc=!sortAsc;}else{sortCol=col;sortAsc=true;}
    ['type','sujet','lien','date','heure','faite'].forEach(c=>{
      const el=document.getElementById('arr-'+c);if(!el)return;
      el.classList.toggle('active',c===sortCol);
      el.textContent=c===sortCol?(sortAsc?'↑':'↓'):'↕';
    });
    renderTable();
  }

  function getSorted(list) {
    return [...list].sort((a,b)=>{
      let va,vb;
      if(sortCol==='type'){va=a.type||'';vb=b.type||'';}
      else if(sortCol==='sujet'){va=a.sujet||'';vb=b.sujet||'';}
      else if(sortCol==='lien'){va=(a.deals?.titre||a.entreprises?.nom||'');vb=(b.deals?.titre||b.entreprises?.nom||'');}
      else if(sortCol==='date'){va=a.date_echeance||'';vb=b.date_echeance||'';}
      else if(sortCol==='heure'){va=a.heure_echeance||'';vb=b.heure_echeance||'';}
      else if(sortCol==='faite'){va=a.faite?1:0;vb=b.faite?1:0;}
      if(va<vb)return sortAsc?-1:1;if(va>vb)return sortAsc?1:-1;return 0;
    });
  }

  function renderTable() {
    const list=getSorted(getFiltered());const tbody=document.getElementById('tableBody');
    if(!list.length){tbody.innerHTML=`<tr><td colspan="8" style="text-align:center;padding:40px;color:#6b778c;font-size:13px">Aucune activité pour cette période.</td></tr>`;return;}
    const typeLabel={appel:'📞 Appel',rdv:'🤝 RDV',email:'✉️ Email',tache:'✅ Tâche',autre:'Autre'};
    const pillCls={appel:'pill-appel',rdv:'pill-rdv',email:'pill-email',tache:'pill-tache'};
    const t=todayStr();
    tbody.innerHTML=list.map(a=>{
      const late=!a.faite&&a.date_echeance&&a.date_echeance<t;
      const lien=[a.deals?esc(a.deals.titre):'',a.entreprises?esc(a.entreprises.nom):'',a.contacts?esc([a.contacts.prenom,a.contacts.nom].filter(Boolean).join(' ')):''
      ].filter(Boolean).join(' · ')||'<span style="color:#c1c7d0">—</span>';
      return`<tr onclick="openModal({},event,'${a.id}')">
        <td class="td-check"><input type="checkbox" ${a.faite?'checked':''} onchange="toggleFait('${a.id}',this.checked)" onclick="event.stopPropagation()" /></td>
        <td><span class="type-pill ${pillCls[a.type]||'pill-autre'}">${typeLabel[a.type]||a.type||'Autre'}</span></td>
        <td class="td-sujet">${a.sujet?esc(a.sujet):'<span class="td-muted">—</span>'}</td>
        <td class="td-muted">${lien}</td>
        <td class="${late?'td-late':'td-muted'}">${fmtDate(a.date_echeance)||'—'}</td>
        <td class="td-muted">${a.heure_echeance?a.heure_echeance.slice(0,5):'—'}</td>
        <td style="text-align:center;color:${a.faite?'#137333':'#c1c7d0'}">${a.faite?'✓':'—'}</td>
        <td class="td-del"><button class="btn-del" onclick="event.stopPropagation();deleteActivite('${a.id}')">✕</button></td>
      </tr>`;
    }).join('');
  }

  // ══════════════════════════════════════
  // MODAL UNIFIÉ
  // ══════════════════════════════════════

  async function openModal(prefill={}, evtOrNull=null, actId=null) {
    // Si appelé depuis un événement HTML (onclick="openModal()"), evtOrNull peut être l'event
    // On ignore l'event ici, c'est juste pour la compatibilité du handler onclick

    modalMode = actId ? 'edit' : 'create';
    editingId = actId;

    // Charger les listes de référence
    const [{data:deals},{data:ents},{data:cts}] = await Promise.all([
      supabase.from('deals').select('id,titre').eq('statut','ouvert').order('titre'),
      supabase.from('entreprises').select('id,nom').order('nom'),
      supabase.from('contacts').select('id,prenom,nom').order('nom')
    ]);
    document.getElementById('f-deal').innerHTML='<option value="">— Aucun —</option>'+(deals||[]).map(d=>`<option value="${d.id}">${esc(d.titre)}</option>`).join('');
    document.getElementById('f-entreprise').innerHTML='<option value="">— Aucune —</option>'+(ents||[]).map(e=>`<option value="${e.id}">${esc(e.nom)}</option>`).join('');
    document.getElementById('f-contact').innerHTML='<option value="">— Aucun —</option>'+(cts||[]).map(c=>`<option value="${c.id}">${esc([c.prenom,c.nom].filter(Boolean).join(' '))}</option>`).join('');

    if(actId) {
      // Mode édition : charger l'activité
      const a = allActivites.find(x=>x.id===actId);
      if(!a) return;
      document.getElementById('modal-title').textContent = 'Modifier l\'activité';
      document.getElementById('btn-save-act').textContent = 'Enregistrer';
      document.getElementById('btn-delete-act').style.display = 'inline-block';
      document.getElementById('faite-section').style.display = 'block';

      // Remplir le formulaire
      document.getElementById('f-type').value = a.type||'';
      document.getElementById('f-date').value = a.date_echeance||'';
      document.getElementById('f-sujet').value = a.sujet||'';
      document.getElementById('f-heure').value = a.heure_echeance||'';
      document.getElementById('f-lieu').value = a.lieu||'';
      document.getElementById('f-deal').value = a.deal_id||'';
      document.getElementById('f-entreprise').value = a.entreprise_id||'';
      document.getElementById('f-contact').value = a.contact_id||'';
      document.getElementById('f-note').value = '';
      document.getElementById('f-faite').checked = a.faite||false;

      // Charger l'historique des notes
      document.getElementById('notes-history-section').style.display = 'block';
      document.getElementById('notes-history-list').innerHTML = '<span style="font-size:13px;color:#9ba3b8">Chargement…</span>';
      loadNotesHistory(a);

    } else {
      // Mode création
      document.getElementById('modal-title').textContent = 'Nouvelle activité';
      document.getElementById('btn-save-act').textContent = 'Créer l\'activité';
      document.getElementById('btn-delete-act').style.display = 'none';
      document.getElementById('faite-section').style.display = 'none';
      document.getElementById('notes-history-section').style.display = 'none';

      // Vider le formulaire
      document.getElementById('f-type').value = prefill.type||'';
      document.getElementById('f-date').value = prefill.date||todayStr();
      document.getElementById('f-sujet').value = '';
      document.getElementById('f-heure').value = '';
      document.getElementById('f-lieu').value = '';
      document.getElementById('f-deal').value = prefill.deal_id||'';
      document.getElementById('f-entreprise').value = prefill.entreprise_id||'';
      document.getElementById('f-contact').value = prefill.contact_id||'';
      document.getElementById('f-note').value = '';
    }

    document.getElementById('modalWrap').classList.add('open');
  }

  async function loadNotesHistory(a) {
    const filters=[];
    if(a.deal_id)filters.push(`deal_id.eq.${a.deal_id}`);
    if(a.contact_id)filters.push(`contact_id.eq.${a.contact_id}`);
    if(a.entreprise_id)filters.push(`entreprise_id.eq.${a.entreprise_id}`);
    let notes=[];
    if(filters.length){
      const {data}=await supabase.from('notes').select('*').or(filters.join(',')).order('created_at',{ascending:false}).limit(10);
      notes=data||[];
    }
    const el=document.getElementById('notes-history-list');
    if(!notes.length){el.innerHTML='<div class="notes-empty">Aucune note pour ce dossier.</div>';return;}
    el.innerHTML=notes.map(n=>`<div class="note-item-m"><div class="note-d-m">${fmtDateHeure(n.created_at)}</div><div class="note-c-m">${esc(n.contenu||'')}</div></div>`).join('');
  }

  function closeModal() {
    document.getElementById('modalWrap').classList.remove('open');
    modalMode='create'; editingId=null;
  }

  function handleModalOutside(e) {
    if(e.target===document.getElementById('modalWrap')) closeModal();
  }

  async function saveModal() {
    const type=document.getElementById('f-type').value;
    const date=document.getElementById('f-date').value;
    if(!type||!date){showToast('Type et date sont requis',true);return;}

    const payload={
      type,
      sujet:         document.getElementById('f-sujet').value.trim()||null,
      date_echeance: date,
      heure_echeance:document.getElementById('f-heure').value||null,
      lieu:          document.getElementById('f-lieu').value.trim()||null,
      deal_id:       document.getElementById('f-deal').value||null,
      entreprise_id: document.getElementById('f-entreprise').value||null,
      contact_id:    document.getElementById('f-contact').value||null,
      updated_at:    new Date().toISOString(),
    };

    const noteContenu = document.getElementById('f-note').value.trim();

    if(modalMode==='edit') {
      payload.faite = document.getElementById('f-faite').checked;
      if(payload.faite && !allActivites.find(a=>a.id===editingId)?.faite) {
        payload.date_fait = new Date().toISOString();
      }

      const {error}=await supabase.from('activites').update(payload).eq('id',editingId);
      if(error){showToast('Erreur : '+error.message,true);return;}

      // Sauvegarder la note si saisie
      if(noteContenu) {
        const a=allActivites.find(x=>x.id===editingId);
        await supabase.from('notes').insert([{contenu:noteContenu,deal_id:a?.deal_id||payload.deal_id||null,contact_id:a?.contact_id||payload.contact_id||null,entreprise_id:a?.entreprise_id||payload.entreprise_id||null}]);
      }

      // Mettre à jour en mémoire
      const idx=allActivites.findIndex(a=>a.id===editingId);
      if(idx!==-1){
        const refreshed={...allActivites[idx],...payload};
        // Mettre à jour les joins si changement
        if(payload.deal_id!==allActivites[idx].deal_id||payload.entreprise_id!==allActivites[idx].entreprise_id||payload.contact_id!==allActivites[idx].contact_id){
          const {data}=await supabase.from('activites').select('*,deals(id,titre),entreprises(id,nom),contacts(id,prenom,nom)').eq('id',editingId).single();
          if(data)allActivites[idx]=data;
        } else {
          allActivites[idx]=refreshed;
        }
      }
      showToast('Activité mise à jour ✓');

    } else {
      // Création
      const {data,error}=await supabase.from('activites')
        .insert([{...payload,faite:false}])
        .select('*,deals(id,titre),entreprises(id,nom),contacts(id,prenom,nom)');
      if(error){showToast('Erreur : '+error.message,true);return;}

      // Sauvegarder la note si saisie
      if(noteContenu&&data[0]) {
        await supabase.from('notes').insert([{contenu:noteContenu,deal_id:data[0].deal_id||null,contact_id:data[0].contact_id||null,entreprise_id:data[0].entreprise_id||null}]);
      }

      allActivites.push(data[0]);
      allActivites.sort((a,b)=>(a.date_echeance||'').localeCompare(b.date_echeance||''));
      showToast('Activité créée ✓');
    }

    closeModal(); refreshBadge(); render();
  }

  async function deleteFromModal() {
    if(!editingId||!confirm('Supprimer cette activité ?'))return;
    const {error}=await supabase.from('activites').delete().eq('id',editingId);
    if(error){showToast('Erreur : '+error.message,true);return;}
    allActivites=allActivites.filter(a=>a.id!==editingId);
    closeModal(); refreshBadge(); render(); showToast('Activité supprimée');
  }

  // ── Toast
  function showToast(msg,isError=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isError?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  load();
</script>
