<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deals — ERC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
</head>
<body style="background:#f5f6fa;">

<nav class="nav">
  <a href="index.html" class="nav-logo">ERC CRM</a>
  <a href="entreprises.html">Entreprises</a>
  <a href="contacts.html">Contacts</a>
  <a href="deals.html" class="active">Deals</a>
  <a href="activites.html">Activités</a>
</nav>

<div class="toolbar">
  <h1>Deals</h1>
  <span class="toolbar-meta" id="chip"></span>
  <div class="view-toggle">
    <button class="view-btn active" id="bk" title="Kanban">
      <svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="1" width="3" height="12" rx=".8"/><rect x="5.5" y="1" width="3" height="8" rx=".8"/><rect x="10" y="1" width="3" height="10" rx=".8"/>
      </svg>
    </button>
    <button class="view-btn" id="bl" title="Liste">
      <svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <line x1="1" y1="3.5" x2="13" y2="3.5"/><line x1="1" y1="7" x2="13" y2="7"/><line x1="1" y1="10.5" x2="13" y2="10.5"/>
      </svg>
    </button>
  </div>
</div>

<div class="subbar show" id="subbar">
  <button class="stab active" data-e="">Toutes <span class="stab-n" id="f-all"></span></button>
  <button class="stab" data-e="qualification">Qualif. <span class="stab-n" id="f-qualification"></span></button>
  <button class="stab" data-e="diagnostic">Diag. <span class="stab-n" id="f-diagnostic"></span></button>
  <button class="stab" data-e="valorisation">Valo. <span class="stab-n" id="f-valorisation"></span></button>
  <button class="stab" data-e="recherche">Rech. <span class="stab-n" id="f-recherche"></span></button>
  <button class="stab" data-e="negociation">Négo. <span class="stab-n" id="f-negociation"></span></button>
  <button class="stab" data-e="closing">Closing <span class="stab-n" id="f-closing"></span></button>
  <button class="stab" data-e="perdu">Perdu <span class="stab-n" id="f-perdu"></span></button>
</div>

<div class="content">
  <div id="state-loading" class="state"><div class="spinner"></div>Chargement...</div>
  
  <div class="kanban" id="kanban-view" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:20px;"></div>
  
  <div class="liste" id="liste-view" style="display:none;">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Affaire / Entreprise</th><th>Étape</th><th>Statut</th>
          <th class="r">Valeur HT</th><th>Échéance prévue</th>
        </tr></thead>
        <tbody id="deals-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="so-overlay" id="so-overlay" onclick="closeSlideOver()"></div>
<div class="slideover" id="slideover">
  <div class="so-hdr">
    <div class="so-hdr-row" style="display:flex; align-items:center; gap:10px;">
      <input type="text" id="so-titre-input" class="so-title" placeholder="Nom du deal" style="flex:1; border:none; background:transparent; font-size:16px; font-weight:600; outline:none; color:#1a1a2e;">
      <button class="so-close" onclick="closeSlideOver()" style="background:none; border:none; cursor:pointer; font-size:18px;">✕</button>
    </div>
    <div class="so-meta" id="so-meta"></div>
  </div>
  <div class="so-body" id="so-body">
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const sb = window.supabase;
const STAGES = [
  {key:'qualification',label:'Qualification',dot:'#3b82f6'},
  {key:'diagnostic',label:'Diagnostic',dot:'#8b5cf6'},
  {key:'valorisation',label:'Valorisation',dot:'#ec4899'},
  {key:'recherche',label:'Recherche',dot:'#f97316'},
  {key:'negociation',label:'Négociation',dot:'#eab308'},
  {key:'closing',label:'Closing',dot:'#22c55e'},
  {key:'perdu',label:'Perdu',dot:'#ef4444'},
];
const BCLS = {qualification:'bq',diagnostic:'bd',valorisation:'bv',recherche:'br',negociation:'bn',closing:'bc',perdu:'bp'};
const STATUTS = ['ouvert','gagné','perdu','en attente'];

let allDeals=[], currentView='kanban', filtreEtape='';
let dragId=null, isDragging=false, currentSoId=null;

function toast(msg, type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast toast-'+type+' show';
  clearTimeout(window.toastT); window.toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

async function loadDeals(){
  document.getElementById('state-loading').style.display='block';
  const {data,error}=await sb.from('deals')
    .select('*,entreprises(nom),contacts(prenom,nom,fonction)')
    .order('created_at',{ascending:false});
  if(error) return;
  allDeals=data||[];
  refreshMeta(); renderKanban(); renderListe(); showView(currentView);
}

function refreshMeta(){
  document.getElementById('chip').textContent=allDeals.length+' deal'+(allDeals.length>1?'s':'');
  document.getElementById('f-all').textContent=allDeals.length;
  STAGES.forEach(s=>{
    const el=document.getElementById('f-'+s.key);
    if(el) el.textContent=allDeals.filter(d=>d.etape===s.key).length||'0';
  });
}

function renderKanban(){
  const wrap=document.getElementById('kanban-view'); wrap.innerHTML='';
  STAGES.forEach(stage=>{
    const deals=allDeals.filter(d=>d.etape===stage.key);
    const col=document.createElement('div'); col.className='kcol'; col.style.width='240px'; col.style.flexShrink='0';
    col.innerHTML=`<div class="col-hdr"><div class="col-hdr-top"><div class="cdot" style="background:${stage.dot}"></div><span class="col-name">${stage.label}</span><span class="col-cnt">${deals.length}</span></div></div>`;
    const zone=document.createElement('div'); zone.className='drop-zone'; zone.style.minHeight='100px';
    deals.forEach(d=>zone.appendChild(buildCard(d)));
    col.appendChild(zone); wrap.appendChild(col);
  });
}

function buildCard(deal){
  const card=document.createElement('div'); card.className='kcard';
  card.innerHTML=`<div class="kcard-titre">${deal.titre}</div><div class="kcard-co">${deal.entreprises?.nom||''}</div><div class="kcard-ft"><span class="kcard-val">${eur(deal.valeur)}</span></div>`;
  card.onclick=()=>openSo(deal.id);
  return card;
}

function renderListe(){
  const tbody=document.getElementById('deals-body'); tbody.innerHTML='';
  allDeals.forEach(deal=>{
    const tr=document.createElement('tr'); tr.onclick=()=>openSo(deal.id);
    tr.innerHTML=`<td><div class="tt">${deal.titre}</div><div class="tc">${deal.entreprises?.nom||''}</div></td><td><span class="badge ${BCLS[deal.etape]||'bq'}">${deal.etape}</span></td><td>${deal.statut||''}</td><td class="r">${eur(deal.valeur)}</td><td>${fd(deal.date_closing_prevu)}</td>`;
    tbody.appendChild(tr);
  });
}

function showView(v){
  currentView=v;
  document.getElementById('kanban-view').style.display=v==='kanban'?'flex':'none';
  document.getElementById('liste-view').style.display=v==='liste'?'block':'none';
  document.getElementById('state-loading').style.display='none';
}

async function openSo(id){
  currentSoId=id;
  document.getElementById('so-overlay').classList.add('open');
  document.getElementById('slideover').classList.add('open');
  const {data:deal}=await sb.from('deals').select('*,entreprises(nom),contacts(prenom,nom)').eq('id',id).single();
  const {data:notes}=await sb.from('notes').select('*').eq('deal_id',id).order('created_at',{ascending:false});
  
  document.getElementById('so-titre-input').value=deal.titre;
  document.getElementById('so-meta').innerHTML=`<span class="badge ${BCLS[deal.etape]||'bq'}">${deal.etape}</span>`;
  
  let html=`<div class="so-form">
    <div class="so-stitle">Détails de l'affaire</div>
    <div class="so-row2">
      <div class="so-field"><label>Étape</label><select id="f-etape">${STAGES.map(s=>`<option value="${s.key}" ${deal.etape===s.key?'selected':''}>${s.label}</option>`).join('')}</select></div>
      <div class="so-field"><label>Statut</label><select id="f-statut">${STATUTS.map(s=>`<option value="${s}" ${deal.statut===s?'selected':''}>${s}</option>`).join('')}</select></div>
    </div>
    <div class="so-field"><label>Valeur HT (€)</label><input type="number" id="f-valeur" value="${deal.valeur||''}"></div>
    <div class="so-field"><label>Échéance prévue</label><input type="date" id="f-closing" value="${deal.date_closing_prevu||''}"></div>
    <div class="so-stitle">Notes</div>
    <div class="note-form"><textarea class="note-ta" id="new-note" placeholder="Ajouter une note..."></textarea><button class="btn-note" onclick="addNote('${id}')">Ajouter</button></div>
    <div id="notes-list">${notes.map(n=>`<div class="note-item"><div class="note-d">${fd(n.created_at)}</div><div class="note-c">${n.contenu}</div></div>`).join('')}</div>
  </div>
  <div class="so-save-bar"><button class="btn-save-deal" onclick="saveDeal('${id}')">Enregistrer les modifications</button></div>`;
  
  document.getElementById('so-body').innerHTML=html;
}

async function saveDeal(id){
  const payload={
    titre: document.getElementById('so-titre-input').value,
    etape: document.getElementById('f-etape').value,
    statut: document.getElementById('f-statut').value,
    valeur: parseFloat(document.getElementById('f-valeur').value)||0,
    date_closing_prevu: document.getElementById('f-closing').value||null,
    updated_at: new Date().toISOString()
  };
  await sb.from('deals').update(payload).eq('id',id);
  toast('Deal mis à jour ✓'); closeSlideOver(); loadDeals();
}

async function addNote(id){
  const content=document.getElementById('new-note').value;
  if(!content) return;
  await sb.from('notes').insert([{contenu:content, deal_id:id}]);
  openSo(id);
}

function closeSlideOver(){
  document.getElementById('so-overlay').classList.remove('open');
  document.getElementById('slideover').classList.remove('open');
}

function eur(n){return (n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});}
function fd(d){if(!d) return '—'; return new Date(d).toLocaleDateString('fr-FR');}

document.getElementById('bk').onclick=()=>showView('kanban');
document.getElementById('bl').onclick=()=>showView('liste');

loadDeals();
</script>
</body>
</html>
