<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deals — ERC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <style>
    /* STYLE ORIGINAL RESTAURÉ ET SÉCURISÉ */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;font-size:14px;color:#1a1a2e;background:#f5f6fa;min-height:100vh}

    /* NAV */
    .nav{background:#0e3d5c;padding:0 24px;height:52px;display:flex;align-items:center;gap:32px}
    .nav-logo{font-weight:700;font-size:16px;color:white;text-decoration:none}
    .nav a{color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;font-weight:500;padding:4px 8px;border-radius:4px}
    .nav a.active{color:white;background:rgba(255,255,255,.1)}

    /* TOOLBAR */
    .toolbar{background:white;border-bottom:1px solid #e8eaf0;padding:12px 24px;display:flex;align-items:center;gap:12px}
    .toolbar h1{font-size:18px;font-weight:600;flex:1}
    .btn-primary{background:#0e3d5c;color:white;border:none;border-radius:6px;padding:8px 16px;font-weight:600;cursor:pointer;font-size:13px}
    .view-toggle{display:flex;border:1px solid #dde1ec;border-radius:6px;overflow:hidden}
    .view-btn{height:36px;width:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:white;border:none;color:#9ba3b8}
    .view-btn.active{background:#0e3d5c;color:white}

    /* SUBBAR */
    .subbar{display:none;background:white;border-bottom:1px solid #e8eaf0;padding:0 24px;gap:2px;overflow-x:auto}.subbar.show{display:flex}
    .stab{padding:10px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:#6b7494;border-bottom:2px solid transparent}
    .stab.active{color:#0e3d5c;border-bottom-color:#0e3d5c;font-weight:600}
    .stab-n{font-size:11px;color:#9ba3b8;margin-left:4px}

    /* KANBAN */
    .content{padding:24px}
    .kanban{display:flex;gap:12px;overflow-x:auto;align-items:flex-start}
    .kcol{flex-shrink:0;width:240px;display:flex;flex-direction:column;gap:8px}
    .col-hdr{background:white;border:1px solid #e8eaf0;border-radius:8px;padding:10px 14px}
    .col-hdr-top{display:flex;align-items:center;gap:8px}.cdot{width:8px;height:8px;border-radius:50%}
    .col-name{font-size:12px;font-weight:600;flex:1}.col-cnt{font-size:11px;color:#9ba3b8;background:#f5f6fa;border-radius:20px;padding:1px 7px}
    .kcard{background:white;border:1px solid #e8eaf0;border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer}
    .kcard-titre{font-size:12px;font-weight:600;margin-bottom:2px}.kcard-co{font-size:11px;color:#6b7494}
    
    /* SLIDE-OVER */
    .so-overlay{display:none;position:fixed;inset:0;background:rgba(9,30,66,.35);z-index:200}.so-overlay.open{display:block}
    .slideover{position:fixed;top:0;right:0;bottom:0;width:480px;background:#fff;z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 24px rgba(0,0,0,.14)}
    .slideover.open{transform:translateX(0)}
    .so-hdr{padding:16px 20px 12px;border-bottom:1px solid #e8eaf0}
    .so-title-input{font-size:15px;font-weight:600;flex:1;border:1px solid transparent;outline:none;font-family:inherit;color:#1a1a2e;padding:4px}
    .so-title-input:hover{border-bottom:1px dashed #dde1ec}.so-title-input:focus{border-bottom:1px solid #0e3d5c;background:#f8f9fc}
    .so-body{flex:1;overflow-y:auto}.so-form{padding:16px 20px}
    .so-stitle{font-size:10px;font-weight:700;text-transform:uppercase;color:#9ba3b8;margin:14px 0 8px}
    .so-field{margin-bottom:12px}
    .so-field label{display:block;font-size:11px;font-weight:600;color:#6b7494;margin-bottom:4px}
    .so-field input, .so-field select, .so-field textarea{width:100%;border:1px solid #dde1ec;border-radius:6px;padding:7px 10px;font-family:inherit;font-size:13px;outline:none}
    .so-finance{background:#f8f9fc;border:1px solid #e8eaf0;border-radius:8px;padding:10px 14px}
    .so-fr{display:flex;justify-content:space-between;font-size:12px;padding:4px 0}.so-fr.ttc{font-weight:700;border-top:1px solid #eee;margin-top:5px;padding-top:8px}
    .so-save-bar{padding:10px 20px;border-top:1px solid #e8eaf0}
    .btn-save-deal{width:100%;height:36px;background:#0e3d5c;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer}
    
    /* TABS */
    .so-tabs{display:flex;border-bottom:1px solid #e8eaf0;background:#fff}
    .so-tab{padding:11px 20px;border:none;background:none;font-size:13px;color:#6b7494;cursor:pointer;border-bottom:2px solid transparent}
    .so-tab.active{color:#0e3d5c;border-bottom-color:#0e3d5c;font-weight:600}
    .so-panel{display:none;padding:14px 20px}.so-panel.active{display:block}
  </style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">ERC CRM</a>
  <a href="entreprises.html">Entreprises</a>
  <a href="contacts.html">Contacts</a>
  <a href="deals.html" class="active">Deals</a>
  <a href="activites.html">Activités</a>
</nav>

<div class="toolbar">
  <h1>Deals</h1>
  <button class="btn-primary" onclick="openSo(null)">+ Nouveau Deal</button>
  <span class="toolbar-meta" id="chip" style="margin-left:12px"></span>
  <div class="view-toggle" style="margin-left:auto">
    <button class="view-btn active" id="bk"><svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1" y="1" width="3" height="12" rx=".8"/><rect x="5.5" y="1" width="3" height="8" rx=".8"/><rect x="10" y="1" width="3" height="10" rx=".8"/></svg></button>
    <button class="view-btn" id="bl"><svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><line x1="1" y1="3.5" x2="13" y2="3.5"/><line x1="1" y1="7" x2="13" y2="7"/><line x1="1" y1="10.5" x2="13" y2="10.5"/></svg></button>
  </div>
</div>

<div class="subbar" id="subbar">
  <button class="stab active" data-e="">Toutes <span class="stab-n" id="f-all"></span></button>
  <button class="stab" data-e="qualification">Qualification <span class="stab-n" id="f-qualification"></span></button>
  <button class="stab" data-e="diagnostic">Diagnostic <span class="stab-n" id="f-diagnostic"></span></button>
  <button class="stab" data-e="valorisation">Valorisation <span class="stab-n" id="f-valorisation"></span></button>
  <button class="stab" data-e="recherche">Recherche <span class="stab-n" id="f-recherche"></span></button>
  <button class="stab" data-e="negociation">Négociation <span class="stab-n" id="f-negociation"></span></button>
  <button class="stab" data-e="closing">Closing <span class="stab-n" id="f-closing"></span></button>
  <button class="stab" data-e="perdu">Perdu <span class="stab-n" id="f-perdu"></span></button>
</div>

<div class="content">
  <div id="state-loading" class="state"><div class="spinner"></div>Chargement...</div>
  <div class="kanban" id="kanban-view" style="display:none"></div>
  <div class="liste" id="liste-view" style="display:none">
    <div class="table-wrap">
      <table>
        <thead><tr><th>Affaire / Entreprise</th><th>Étape</th><th>Statut</th><th class="r">Valeur HT</th><th>Échéance prévue</th></tr></thead>
        <tbody id="deals-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="so-overlay" id="so-overlay" onclick="closeSlideOver()"></div>
<div class="slideover" id="slideover">
  <div class="so-hdr">
    <div style="display:flex; align-items:center; gap:10px;">
      <input type="text" id="so-titre-input" class="so-title-input" placeholder="Nom du deal...">
      <button onclick="closeSlideOver()" style="background:none; border:none; cursor:pointer; font-size:18px; color:#9ba3b8">✕</button>
    </div>
    <div id="so-meta" style="margin-top:8px"></div>
  </div>
  <div class="so-body" id="so-body"></div>
  <div class="so-save-bar">
    <button class="btn-save-deal" id="btn-save-deal">Enregistrer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const sb = window.supabase;
const STAGES = [
  {key:'qualification',label:'Qualification',dot:'#3b82f6'},
  {key:'diagnostic',label:'Diagnostic',dot:'#8b5cf6'},
  {key:'valorisation',label:'Valorisation',dot:'#ec4899'},
  {key:'recherche',label:'Recherche',dot:'#f97316'},
  {key:'negociation',label:'Négociation',dot:'#eab308'},
  {key:'closing',label:'Closing',dot:'#22c55e'},
  {key:'perdu',label:'Perdu',dot:'#ef4444'}
];
const STATUTS = ['ouvert','gagné','perdu','en attente'];

let allDeals=[], currentView='kanban', currentSoId=null;

function toast(msg, type='success'){
  const el=document.getElementById('toast'); el.textContent=msg;
  el.className='toast toast-'+type+' show';
  setTimeout(()=>el.classList.remove('show'),2800);
}

async function loadDeals(){
  const {data,error}=await sb.from('deals').select('*,entreprises(nom)').order('created_at',{ascending:false});
  if(error) return;
  allDeals=data||[];
  refreshMeta(); renderKanban(); renderListe(); showView(currentView);
}

function refreshMeta(){
  document.getElementById('chip').textContent=allDeals.length+' deals';
  document.getElementById('f-all').textContent=allDeals.length;
  STAGES.forEach(s=> {
    const el = document.getElementById('f-'+s.key);
    if(el) el.textContent = allDeals.filter(d=>d.etape===s.key).length;
  });
}

function renderKanban(){
  const wrap=document.getElementById('kanban-view'); wrap.innerHTML='';
  STAGES.forEach(stage=>{
    const deals=allDeals.filter(d=>d.etape===stage.key);
    const col=document.createElement('div'); col.className='kcol';
    col.innerHTML=`<div class="col-hdr"><div class="col-hdr-top"><div class="cdot" style="background:${stage.dot}"></div><span class="col-name">${stage.label}</span><span class="col-cnt">${deals.length}</span></div></div>`;
    const zone=document.createElement('div'); zone.className='drop-zone';
    deals.forEach(d=>{
      const card=document.createElement('div'); card.className='kcard';
      card.innerHTML=`<div class="kcard-titre">${esc(d.titre)}</div><div class="kcard-co">${esc(d.entreprises?.nom||'')}</div>`;
      card.onclick=()=>openSo(d.id);
      zone.appendChild(card);
    });
    col.appendChild(zone); wrap.appendChild(col);
  });
}

function renderListe(){
  const tbody=document.getElementById('deals-body'); tbody.innerHTML='';
  allDeals.forEach(d=>{
    const tr=document.createElement('tr'); tr.onclick=()=>openSo(d.id);
    tr.innerHTML=`<td><div class="tt">${esc(d.titre)}</div><div class="tc">${esc(d.entreprises?.nom||'')}</div></td><td>${d.etape}</td><td>${d.statut}</td><td class="r">${eur(d.valeur)}</td><td>${fd(d.date_closing_prevu)}</td>`;
    tbody.appendChild(tr);
  });
}

function showView(v){
  currentView=v;
  document.getElementById('bk').classList.toggle('active', v==='kanban');
  document.getElementById('bl').classList.toggle('active', v==='liste');
  document.getElementById('kanban-view').style.display=v==='kanban'?'flex':'none';
  document.getElementById('liste-view').style.display=v==='liste'?'block':'none';
  document.getElementById('state-loading').style.display='none';
}

async function openSo(id){
  currentSoId = id;
  const deal = id ? allDeals.find(d => d.id === id) : { titre:'', etape:'qualification', statut:'ouvert', valeur_ht:0, notes:'' };
  
  document.getElementById('so-overlay').classList.add('open');
  document.getElementById('slideover').classList.add('open');
  document.getElementById('so-titre-input').value = deal.titre;
  document.getElementById('so-meta').innerHTML = id ? `<span class="badge bq">${deal.etape}</span>` : 'Nouvelle affaire';

  const {data:ents} = await sb.from('entreprises').select('id,nom').order('nom');

  document.getElementById('so-body').innerHTML = `
    <div class="so-form">
      <div class="so-field"><label>Entreprise</label>
        <select id="f-entreprise"><option value="">-- Choisir --</option>
        ${ents.map(e=>`<option value="${e.id}" ${deal.entreprise_id===e.id?'selected':''}>${e.nom}</option>`).join('')}</select>
      </div>
      <div class="so-row2">
        <div class="so-field"><label>Étape</label><select id="f-etape">${STAGES.map(s=>`<option value="${s.key}" ${deal.etape===s.key?'selected':''}>${s.label}</option>`).join('')}</select></div>
        <div class="so-field"><label>Statut</label><select id="f-statut">${STATUTS.map(s=>`<option value="${s}" ${deal.statut===s?'selected':''}>${s}</option>`).join('')}</select></div>
      </div>
      <div class="so-stitle">Financier</div>
      <div class="so-field"><label>Valeur HT (€)</label><input type="number" id="f-valeur-ht"
