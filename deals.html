<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deals — ERC CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <style>
    /* TOOLBAR — compléments spécifiques deals */
    .toolbar{padding:12px 24px}
    .toolbar h1{font-size:18px;font-weight:600;flex:1}
    .toolbar-meta{font-size:13px;color:#9ba3b8}
    .view-toggle{display:flex;border:1px solid #dde1ec;border-radius:6px;overflow:hidden}
    .view-btn{height:36px;width:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:white;border:none;color:#9ba3b8;transition:background .15s,color .15s}
    .view-btn.active{background:#0e3d5c;color:white}
    .view-btn:hover:not(.active){background:#f5f6fa}

    /* SUBBAR */
    .subbar{display:none;background:white;border-bottom:1px solid #e8eaf0;padding:0 24px;gap:2px;overflow-x:auto;scrollbar-width:none}
    .subbar.show{display:flex}
    .stab{padding:10px 14px;border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#6b7494;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
    .stab:hover{color:#1a1a2e}
    .stab.active{color:#0e3d5c;border-bottom-color:#0e3d5c}
    .stab-n{font-size:11px;color:#9ba3b8;margin-left:4px}

    /* CONTENT / KANBAN */
    .content{padding:24px}
    .kanban{display:flex;gap:12px;overflow-x:auto;align-items:flex-start;padding-bottom:20px;scrollbar-width:thin;scrollbar-color:#dde1ec transparent}
    .kcol{flex-shrink:0;width:240px;display:flex;flex-direction:column;gap:8px}
    .col-hdr{background:white;border:1px solid #e8eaf0;border-radius:8px;padding:10px 14px}
    .col-hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
    .cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .col-name{font-size:12px;font-weight:600;flex:1}
    .col-cnt{font-size:11px;color:#9ba3b8;background:#f5f6fa;border:1px solid #e8eaf0;border-radius:20px;padding:1px 7px}
    .col-sub{font-size:11px;color:#9ba3b8}
    .drop-zone{min-height:40px;border-radius:8px;border:2px dashed transparent;transition:border-color .15s,background .15s,min-height .15s;display:flex;flex-direction:column;gap:8px}
    .drop-zone.drag-over{border-color:#0e3d5c;background:rgba(14,61,92,.04);min-height:80px}
    .kcard{background:white;border:1px solid #e8eaf0;border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:box-shadow .15s,border-color .15s,opacity .15s;user-select:none;position:relative}
    .kcard:hover{border-color:#c5cce0;box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .kcard.dragging{opacity:.4;cursor:grabbing;box-shadow:none}
    .kcard.active-so{border-color:#0e3d5c;box-shadow:0 0 0 2px rgba(14,61,92,.18)}
    .kcard-titre{font-size:12px;font-weight:600;line-height:1.35;margin-bottom:2px}
    .kcard-co{font-size:11px;color:#6b7494;margin-bottom:10px}
    .kcard-ft{display:flex;align-items:center;justify-content:space-between;gap:4px}
    .kcard-val{font-size:11px;font-weight:600}
    .kcard-val.z{color:#9ba3b8;font-weight:400}
    .kcard-st{font-size:10px;color:#6b7494;background:#f5f6fa;border-radius:4px;padding:2px 6px}
    .kcard-st.soon{color:#e84c0a;background:#fff4f0}
    .col-empty{border:1px dashed #e8eaf0;border-radius:8px;padding:18px 12px;text-align:center;font-size:11px;color:#9ba3b8}

    /* LISTE */
    .liste{display:none}
    .liste.show{display:block}
    .table-wrap{background:white;border-radius:8px;border:1px solid #e8eaf0;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead{background:#f8f9fc;border-bottom:1px solid #e8eaf0}
    th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:#6b7494;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
    th.r{text-align:right}
    tbody tr{border-bottom:1px solid #f0f2f7;transition:background .1s;cursor:pointer}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#f8f9fc}
    tbody tr.active-so{background:#e8f0fe!important}
    td{padding:12px 16px;vertical-align:middle}
    .tt{font-size:13px;font-weight:500}
    .tc{font-size:11px;color:#6b7494;margin-top:2px}
    .tv{text-align:right;font-size:13px;font-weight:500;white-space:nowrap}
    .tv.z{color:#9ba3b8;font-weight:400}
    .td2{font-size:12px;color:#6b7494}
    .td2.soon{color:#e84c0a;font-weight:500}

    /* BADGES étapes (override style.css : ajout du dot ::before + padding gauche) */
    .badge{padding:3px 9px 3px 6px}
    .badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .bq{background:#e8f0fe;color:#1967d2}.bq::before{background:#3b82f6}
    .bd{background:#f3f0ff;color:#6d28d9}.bd::before{background:#8b5cf6}
    .bv{background:#fce7f3;color:#be185d}.bv::before{background:#ec4899}
    .br{background:#fff7ed;color:#c2410c}.br::before{background:#f97316}
    .bn{background:#fefce8;color:#a16207}.bn::before{background:#eab308}
    .bc{background:#e6f4ea;color:#137333}.bc::before{background:#22c55e}
    .bp{background:#fce8e6;color:#c5221f}.bp::before{background:#ef4444}

    /* ÉTATS */
    .state{background:white;border:1px solid #e8eaf0;border-radius:8px;padding:80px;text-align:center;color:#9ba3b8;font-size:13px}
    .state strong{display:block;color:#6b7494;font-size:14px;font-weight:500;margin-bottom:4px}
    .spinner{width:20px;height:20px;border:2px solid #e8eaf0;border-top-color:#0e3d5c;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
    /* Toast : override positionnement (style.css centre, ici on aligne à droite) */
    .toast{bottom:24px;left:auto;right:24px;transform:translateY(80px)}
    .toast.show{transform:translateY(0)}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* SLIDE-OVER */
    .so-overlay{display:none;position:fixed;inset:0;background:rgba(9,30,66,.35);z-index:200}
    .so-overlay.open{display:block}
    .slideover{position:fixed;top:0;right:0;bottom:0;width:480px;background:#fff;z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;box-shadow:-4px 0 24px rgba(0,0,0,.14)}
    .slideover.open{transform:translateX(0)}

    .so-hdr{padding:16px 20px 12px;border-bottom:1px solid #e8eaf0;flex-shrink:0}
    .so-hdr-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
    .so-title{font-size:15px;font-weight:600;flex:1;line-height:1.4;border:none;border-bottom:2px solid transparent;background:transparent;font-family:'DM Sans',sans-serif;color:#1a1a2e;padding:2px 0;outline:none;width:100%;transition:border-color .15s}
    .so-title:hover{border-bottom-color:#dde1ec}
    .so-title:focus{border-bottom-color:#0e3d5c}
    .so-close{background:none;border:none;cursor:pointer;color:#9ba3b8;font-size:20px;line-height:1;padding:2px 4px;flex-shrink:0}
    .so-close:hover{color:#1a1a2e}
    .so-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;min-height:22px}

    .so-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
    .so-loading{padding:32px 20px;text-align:center;color:#9ba3b8;font-size:13px}
    .so-spin{width:16px;height:16px;border:2px solid #e8eaf0;border-top-color:#0e3d5c;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}

    /* Formulaire slide-over */
    .so-form{padding:16px 20px 8px}
    .so-stitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ba3b8;margin:14px 0 8px}
    .so-stitle:first-child{margin-top:0}
    .so-field{margin-bottom:10px}
    .so-field label{display:block;font-size:11px;font-weight:600;color:#6b7494;margin-bottom:4px}
    .so-field input,.so-field select,.so-field textarea{width:100%;border:1px solid #dde1ec;border-radius:6px;padding:7px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1a1a2e;background:#fff;outline:none;transition:border-color .15s}
    .so-field input:focus,.so-field select:focus,.so-field textarea:focus{border-color:#0e3d5c}
    .so-field textarea{resize:vertical;min-height:64px}
    .so-row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* Bloc financier calculé */
    .so-finance{background:#f8f9fc;border:1px solid #e8eaf0;border-radius:8px;padding:10px 14px;margin-top:2px}
    .so-fr{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #f0f2f7}
    .so-fr:last-child{border-bottom:none}
    .so-fr .l{color:#6b7494}
    .so-fr .v{font-weight:500}
    .so-fr.ttc .l{font-weight:700;color:#1a1a2e;font-size:13px}
    .so-fr.ttc .v{font-weight:700;color:#137333;font-size:14px}

    /* Contexte lecture */
    .so-ctx{font-size:12px;color:#6b7494;margin-bottom:12px;line-height:1.75}
    .so-produit{background:#e8f4fd;border:1px solid #b3d9f5;border-radius:6px;padding:7px 12px;font-size:12px;margin-bottom:10px}
    .so-produit strong{color:#0e3d5c}

    /* Barre save */
    .so-save-bar{padding:10px 20px;border-top:1px solid #e8eaf0;border-bottom:1px solid #e8eaf0;flex-shrink:0;background:#fff}
    .btn-save-deal{width:100%;height:36px;background:#0e3d5c;color:white;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
    .btn-save-deal:hover{background:#0b3050}
    .btn-save-deal:disabled{opacity:.5;cursor:not-allowed}

    /* Tabs */
    .so-tabs{display:flex;border-bottom:1px solid #e8eaf0;flex-shrink:0;background:#fff}
    .so-tab{padding:11px 20px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#6b7494;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s}
    .so-tab.active{color:#0e3d5c;border-bottom-color:#0e3d5c;font-weight:600}
    .so-tab:hover:not(.active){color:#1a1a2e}
    .so-cnt{display:inline-block;background:#e8eaf0;color:#6b7494;border-radius:20px;font-size:10px;font-weight:700;padding:1px 6px;margin-left:4px}
    .so-tab.active .so-cnt{background:rgba(14,61,92,.12);color:#0e3d5c}
    .so-panel{display:none;padding:14px 20px}
    .so-panel.active{display:block}
    .so-empty{text-align:center;padding:28px 16px;color:#9ba3b8;font-size:13px}

    /* Activités */
    .act-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f0f2f7}
    .act-item:last-child{border-bottom:none}
    .act-pill{flex-shrink:0;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
    .p-appel{background:#deebff;color:#0052cc}
    .p-rdv{background:#e3fcef;color:#006644}
    .p-email{background:#fffae6;color:#974f0c}
    .p-tache{background:#eae6ff;color:#403294}
    .p-autre{background:#f4f5f7;color:#6b7494}
    .act-info{flex:1;min-width:0}
    .act-sujet{font-size:13px;font-weight:500;margin-bottom:2px}
    .act-date{font-size:11px;color:#9ba3b8}
    .act-done{opacity:.45}
    .act-done .act-sujet{text-decoration:line-through}
    .act-late .act-date{color:#e84c0a;font-weight:600}

    /* Notes */
    .note-form{margin-bottom:14px}
    .note-ta{width:100%;border:1px solid #dde1ec;border-radius:6px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:#1a1a2e;resize:vertical;min-height:68px;outline:none;transition:border-color .15s;display:block;margin-bottom:8px}
    .note-ta:focus{border-color:#0e3d5c}
    .btn-note{height:32px;padding:0 14px;background:#0e3d5c;color:white;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
    .btn-note:hover{background:#0b3050}
    .note-item{padding:10px 0;border-bottom:1px solid #f0f2f7}
    .note-item:last-child{border-bottom:none}
    .note-d{font-size:11px;color:#9ba3b8;margin-bottom:4px}
    .note-c{font-size:13px;line-height:1.55;background:#f8f9fc;border-radius:6px;padding:8px 10px;border-left:2px solid #dde1ec}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>ERC CRM</h1>
    <nav class="topbar-nav">
      <a href="entreprises.html">Entreprises</a>
      <a href="contacts.html">Contacts</a>
      <a href="deals.html" class="active">Deals</a>
      <a href="activites.html">Activités</a>
    </nav>
  </div>
</div>

<div class="toolbar">
  <h1>Deals</h1>
  <span class="toolbar-meta" id="chip"></span>
  <div class="view-toggle">
    <button class="view-btn active" id="bk" title="Kanban">
      <svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <rect x="1" y="1" width="3" height="12" rx=".8"/><rect x="5.5" y="1" width="3" height="8" rx=".8"/><rect x="10" y="1" width="3" height="10" rx=".8"/>
      </svg>
    </button>
    <button class="view-btn" id="bl" title="Liste">
      <svg width="16" height="16" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4">
        <line x1="1" y1="3.5" x2="13" y2="3.5"/><line x1="1" y1="7" x2="13" y2="7"/><line x1="1" y1="10.5" x2="13" y2="10.5"/>
      </svg>
    </button>
  </div>
</div>

<div class="subbar" id="subbar">
  <button class="stab active" data-e="">Toutes <span class="stab-n" id="f-all"></span></button>
  <button class="stab" data-e="qualification">Qualification <span class="stab-n" id="f-qualification"></span></button>
  <button class="stab" data-e="diagnostic">Diagnostic <span class="stab-n" id="f-diagnostic"></span></button>
  <button class="stab" data-e="valorisation">Valorisation <span class="stab-n" id="f-valorisation"></span></button>
  <button class="stab" data-e="recherche">Recherche <span class="stab-n" id="f-recherche"></span></button>
  <button class="stab" data-e="negociation">Négociation <span class="stab-n" id="f-negociation"></span></button>
  <button class="stab" data-e="closing">Closing <span class="stab-n" id="f-closing"></span></button>
  <button class="stab" data-e="perdu">Perdu <span class="stab-n" id="f-perdu"></span></button>
</div>

<div class="content">
  <div id="state-loading" class="state"><div class="spinner"></div>Chargement des deals…</div>
  <div id="state-error" class="state" style="display:none">
    <div style="font-size:24px;margin-bottom:10px">⚠️</div>
    <strong>Impossible de charger les données</strong>
    <span id="error-msg"></span>
  </div>
  <div class="kanban" id="kanban-view" style="display:none"></div>
  <div class="liste" id="liste-view">
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Affaire / Entreprise</th><th>Étape</th><th>Statut</th>
          <th class="r">Valeur HT</th><th>Closing prévu</th>
        </tr></thead>
        <tbody id="deals-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- SLIDE-OVER -->
<div class="so-overlay" id="so-overlay" onclick="closeSlideOver()"></div>
<div class="slideover" id="slideover">
  <div class="so-hdr">
    <div class="so-hdr-row">
      <input class="so-title" id="so-titre" type="text" value="—" placeholder="Nom du deal">
      <button class="so-close" onclick="closeSlideOver()">✕</button>
    </div>
    <div class="so-meta" id="so-meta"></div>
  </div>
  <div class="so-body" id="so-body">
    <div class="so-loading"><div class="so-spin"></div>Chargement…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const sb = window.supabase;
const STAGES = [
  {key:'qualification',label:'Qualification',dot:'#3b82f6'},
  {key:'diagnostic',label:'Diagnostic',dot:'#8b5cf6'},
  {key:'valorisation',label:'Valorisation',dot:'#ec4899'},
  {key:'recherche',label:'Recherche',dot:'#f97316'},
  {key:'negociation',label:'Négociation',dot:'#eab308'},
  {key:'closing',label:'Closing',dot:'#22c55e'},
  {key:'perdu',label:'Perdu',dot:'#ef4444'},
];
const BCLS = {qualification:'bq',diagnostic:'bd',valorisation:'bv',recherche:'br',negociation:'bn',closing:'bc',perdu:'bp'};
const STATUTS = ['ouvert','gagné','perdu','en attente'];

let allDeals=[], currentView='kanban', filtreEtape='';
let dragId=null, isDragging=false, currentSoId=null;

// Toast
let toastT;
function toast(msg, type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast toast-'+type+' show';
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

// Chargement
async function loadDeals(){
  showState('loading');
  const {data,error}=await sb.from('deals')
    .select('id,titre,etape,statut,valeur,probabilite,date_closing_prevu,date_gain,entreprises(nom)')
    .order('created_at',{ascending:false});
  if(error){document.getElementById('error-msg').textContent=error.message;showState('error');return;}
  allDeals=data||[];
  refreshMeta(); renderKanban(); renderListe(); showView(currentView);
}

function refreshMeta(){
  const n=allDeals.length;
  document.getElementById('chip').textContent=n+' deal'+(n>1?'s':'');
  document.getElementById('f-all').textContent=n;
  STAGES.forEach(s=>{
    const el=document.getElementById('f-'+s.key);
    if(el) el.textContent=allDeals.filter(d=>d.etape===s.key).length||'';
  });
}

// Kanban
function renderKanban(){
  const wrap=document.getElementById('kanban-view'); wrap.innerHTML='';
  STAGES.forEach(stage=>{
    const deals=allDeals.filter(d=>d.etape===stage.key);
    const total=deals.reduce((s,d)=>s+(parseFloat(d.valeur)||0),0);
    const col=document.createElement('div'); col.className='kcol'; col.dataset.etape=stage.key;
    col.innerHTML='<div class="col-hdr"><div class="col-hdr-top">'
      +'<div class="cdot" style="background:'+stage.dot+'"></div>'
      +'<span class="col-name">'+stage.label+'</span>'
      +'<span class="col-cnt">'+deals.length+'</span></div>'
      +'<div class="col-sub">'+(total>0?eur(total):'')+'</div></div>';
    const zone=document.createElement('div'); zone.className='drop-zone'; zone.dataset.etape=stage.key;
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
    zone.addEventListener('dragleave',e=>{if(!zone.contains(e.relatedTarget))zone.classList.remove('drag-over');});
    zone.addEventListener('drop',async e=>{
      e.preventDefault(); zone.classList.remove('drag-over');
      const newE=zone.dataset.etape;
      if(!dragId||!newE) return;
      const deal=allDeals.find(d=>d.id===dragId);
      if(!deal||deal.etape===newE) return;
      const old=deal.etape; deal.etape=newE;
      renderKanban(); refreshMeta();
      const {error}=await sb.from('deals').update({etape:newE,updated_at:new Date().toISOString()}).eq('id',dragId);
      if(error){deal.etape=old;renderKanban();refreshMeta();toast('Erreur sauvegarde','error');}
      else{
        toast('Déplacé vers "'+STAGES.find(s=>s.key===newE)?.label+'" ✓');
        if(currentSoId===dragId){
          const sel=document.getElementById('f-etape'); if(sel) sel.value=newE;
          document.getElementById('so-meta').innerHTML=buildMeta({...deal,etape:newE});
        }
      }
    });
    if(!deals.length){
      const em=document.createElement('div');em.className='col-empty';em.textContent='Déposez ici';zone.appendChild(em);
    } else {
      deals.forEach(d=>zone.appendChild(buildCard(d)));
    }
    col.appendChild(zone); wrap.appendChild(col);
  });
}

function buildCard(deal){
  const card=document.createElement('div');
  card.className='kcard'+(deal.id===currentSoId?' active-so':'');
  card.draggable=true; card.dataset.id=deal.id;
  const nomCo=deal.entreprises?.nom||'';
  const v=parseFloat(deal.valeur); const isZ=isNaN(v)||v===0;
  const today=new Date(); today.setHours(0,0,0,0);
  const in30=new Date(today); in30.setDate(in30.getDate()+30);
  let dtLabel='',soon=false;
  if(deal.date_closing_prevu){
    const dt=new Date(deal.date_closing_prevu);
    soon=dt>=today&&dt<=in30;
    dtLabel=dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
  }
  card.innerHTML='<div class="kcard-titre">'+esc(deal.titre)+'</div>'
    +(nomCo?'<div class="kcard-co">'+esc(nomCo)+'</div>':'<div class="kcard-co" style="height:17px"></div>')
    +'<div class="kcard-ft">'
    +'<span class="kcard-val'+(isZ?' z':'')+'">'+( isZ?'—':eur(v))+'</span>'
    +(dtLabel?'<span class="kcard-st'+(soon?' soon':'')+'">📅 '+dtLabel+'</span>'
      :(deal.statut?'<span class="kcard-st">'+esc(deal.statut)+'</span>':''))
    +'</div>';
  card.addEventListener('dragstart',e=>{isDragging=true;dragId=deal.id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('drag-over'));setTimeout(()=>{isDragging=false;},50);});
  card.addEventListener('click',()=>{if(!isDragging) openSo(deal.id);});
  return card;
}

// Liste
function renderListe(){
  const today=new Date();today.setHours(0,0,0,0);
  const in30=new Date(today);in30.setDate(in30.getDate()+30);
  const deals=filtreEtape?allDeals.filter(d=>d.etape===filtreEtape):allDeals;
  const tbody=document.getElementById('deals-body'); tbody.innerHTML='';
  deals.forEach(deal=>{
    const tr=document.createElement('tr');
    if(deal.id===currentSoId) tr.classList.add('active-so');
    const nomCo=deal.entreprises?.nom||'';
    const ek=(deal.etape||'').toLowerCase().replace(/[^a-z]/g,'');
    const elbl=STAGES.find(s=>s.key===ek)?.label||deal.etape||'—';
    tr.innerHTML='<td><div class="tt">'+esc(deal.titre)+'</div>'+(nomCo?'<div class="tc">'+esc(nomCo)+'</div>':'')+'</td>'
      +'<td>'+(ek?'<span class="badge '+(BCLS[ek]||'')+'">'+elbl+'</span>':'—')+'</td>'
      +'<td><span style="font-size:12px;color:#6b7494">'+esc(deal.statut||'—')+'</span></td>'
      +'<td>'+vHtml(deal.valeur)+'</td>'
      +'<td>'+dHtml(deal.date_closing_prevu,today,in30)+'</td>';
    tr.addEventListener('click',()=>openSo(deal.id));
    tbody.appendChild(tr);
  });
}

// Vue toggle
function showView(v){
  currentView=v; const isK=v==='kanban';
  document.getElementById('bk').classList.toggle('active',isK);
  document.getElementById('bl').classList.toggle('active',!isK);
  document.getElementById('kanban-view').style.display=isK?'flex':'none';
  document.getElementById('liste-view').classList.toggle('show',!isK);
  document.getElementById('subbar').classList.toggle('show',!isK);
  document.getElementById('state-loading').style.display='none';
  document.getElementById('state-error').style.display='none';
}
function showState(s){
  document.getElementById('state-loading').style.display=s==='loading'?'block':'none';
  document.getElementById('state-error').style.display=s==='error'?'block':'none';
  document.getElementById('kanban-view').style.display='none';
  document.getElementById('liste-view').classList.remove('show');
  document.getElementById('subbar').classList.remove('show');
}
document.getElementById('bk').addEventListener('click',()=>showView('kanban'));
document.getElementById('bl').addEventListener('click',()=>showView('liste'));
document.getElementById('subbar').addEventListener('click',e=>{
  const btn=e.target.closest('.stab'); if(!btn) return;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  filtreEtape=btn.dataset.e; renderListe();
});

// ── SLIDE-OVER ──────────────────────────────

async function openSo(dealId){
  if(dealId===currentSoId){closeSlideOver();return;}
  currentSoId=dealId;
  markActive(dealId);
  document.getElementById('so-overlay').classList.add('open');
  document.getElementById('slideover').classList.add('open');
  document.getElementById('so-titre').textContent='…';
  document.getElementById('so-meta').innerHTML='';
  document.getElementById('so-body').innerHTML='<div class="so-loading"><div class="so-spin"></div>Chargement…</div>';

  const [{data:deal,error:err},{data:acts},{data:notes},{data:leads}] = await Promise.all([
    sb.from('deals').select('*,entreprises(id,nom),contacts(id,prenom,nom,fonction)').eq('id',dealId).single(),
    sb.from('activites').select('*').eq('deal_id',dealId).order('date_echeance',{ascending:false}),
    sb.from('notes').select('*').eq('deal_id',dealId).order('created_at',{ascending:false}),
    sb.from('leads').select('produits(id,nom,taxe,prix_eur)').eq('deal_id',dealId).limit(1)
  ]);

  if(err||!deal){
    document.getElementById('so-body').innerHTML='<div class="so-loading" style="color:#c5221f">Erreur de chargement.</div>';
    return;
  }

  const produit=leads?.[0]?.produits||null;
  document.getElementById('so-titre').value=deal.titre;
  document.getElementById('so-meta').innerHTML=buildMeta(deal);
  document.getElementById('so-body').innerHTML=buildBody(deal,produit,acts||[],notes||[]);

  document.getElementById('f-valeur')?.addEventListener('input',recalcFinance);
  document.getElementById('btn-note')?.addEventListener('click',()=>addNote(dealId));
}

function buildMeta(deal){
  const ek=deal.etape||'';
  const lbl=STAGES.find(s=>s.key===ek)?.label||ek;
  let h='<span class="badge '+(BCLS[ek]||'')+'">'+lbl+'</span>';
  if(deal.statut) h+='<span style="font-size:11px;font-weight:500;color:#6b7494;background:#f5f6fa;border:1px solid #e8eaf0;border-radius:20px;padding:2px 9px">'+esc(deal.statut)+'</span>';
  return h;
}

function buildBody(deal,produit,acts,notes){
  const ht=parseFloat(deal.valeur)||0;
  const tvaRate=produit?.taxe!=null?parseFloat(produit.taxe):20;
  const tva=ht*tvaRate/100, ttc=ht+tva;

  let ctx='';
  if(deal.entreprises?.nom) ctx+='🏢 '+esc(deal.entreprises.nom)+'<br>';
  if(deal.contacts){
    const n=[deal.contacts.prenom,deal.contacts.nom].filter(Boolean).join(' ');
    ctx+='👤 '+esc(n)+(deal.contacts.fonction?' · '+esc(deal.contacts.fonction):'');
  }

  const prodBlock=produit
    ?'<div class="so-produit">Produit : <strong>'+esc(produit.nom)+'</strong>'
      +(produit.prix_eur!=null?' <span style="color:#6b7494;font-weight:400">· Prix catalogue : '+eur(parseFloat(produit.prix_eur))+'</span>':'')
      +'</div>'
    :'';

  const stageOpts=STAGES.map(s=>'<option value="'+s.key+'"'+(deal.etape===s.key?' selected':'')+'>'+s.label+'</option>').join('');
  const statOpts=STATUTS.map(s=>'<option value="'+s+'"'+(deal.statut===s?' selected':'')+'>'+(s.charAt(0).toUpperCase()+s.slice(1))+'</option>').join('');

  return (ctx?'<div class="so-form" style="padding-bottom:0"><div class="so-ctx">'+ctx+'</div></div>':'')
    +prodBlock
    +'<div class="so-form">'
    +'<div class="so-stitle">Pipeline</div>'
    +'<div class="so-row2">'
    +'<div class="so-field"><label>Étape</label><select id="f-etape">'+stageOpts+'</select></div>'
    +'<div class="so-field"><label>Statut</label><select id="f-statut">'+statOpts+'</select></div>'
    +'</div>'
    +'<div class="so-field"><label>Probabilité (%)</label>'
    +'<input type="number" id="f-proba" min="0" max="100" step="5" value="'+(deal.probabilite!=null?deal.probabilite:'')+'" placeholder="0 – 100"></div>'

    +'<div class="so-stitle">Financier</div>'
    +'<div class="so-field"><label>Valeur HT (€)</label>'
    +'<input type="number" id="f-valeur" min="0" step="100" value="'+(ht||'')+'" placeholder="Ex : 12000"></div>'
    +'<div class="so-finance">'
    +'<div class="so-fr"><span class="l">Base HT</span><span class="v" id="fi-ht">'+eur(ht)+'</span></div>'
    +'<div class="so-fr"><span class="l">Remise</span><span class="v" style="color:#9ba3b8">—</span></div>'
    +'<div class="so-fr"><span class="l">TVA '+tvaRate+'%</span><span class="v" id="fi-tva">'+eur(tva)+'</span></div>'
    +'<div class="so-fr ttc"><span class="l">Total TTC</span><span class="v" id="fi-ttc">'+eur(ttc)+'</span></div>'
    +'</div>'

    +'<div class="so-stitle">Dates</div>'
    +'<div class="so-row2">'
    +'<div class="so-field"><label>Échéance</label><input type="date" id="f-closing" value="'+(deal.date_closing_prevu||'')+'"></div>'
    +'<div class="so-field"><label>Date réalisation</label><input type="date" id="f-gain" value="'+(deal.date_gain||'')+'"></div>'
    +'</div>'

    +'<div class="so-stitle">Note interne</div>'
    +'<div class="so-field"><textarea id="f-notes" placeholder="Contexte, remarques…">'+esc(deal.notes||'')+'</textarea></div>'
    +'</div>'

    +'<div class="so-save-bar">'
    +'<button class="btn-save-deal" id="btn-save-deal" onclick="saveDeal(\''+deal.id+'\')">Enregistrer les modifications</button>'
    +'</div>'

    +'<div class="so-tabs">'
    +'<button class="so-tab active" id="tab-act" onclick="switchTab(\'act\')">Activités <span class="so-cnt" id="cnt-act">'+(acts.length||'')+'</span></button>'
    +'<button class="so-tab" id="tab-notes" onclick="switchTab(\'notes\')">Notes <span class="so-cnt" id="cnt-notes">'+(notes.length||'')+'</span></button>'
    +'</div>'
    +'<div class="so-panel active" id="panel-act">'+buildActs(acts)+'</div>'
    +'<div class="so-panel" id="panel-notes">'+buildNotes(notes,deal.id)+'</div>';
}

function recalcFinance(){
  const ht=parseFloat(document.getElementById('f-valeur')?.value)||0;
  const tva=ht*20/100, ttc=ht+tva;
  const a=document.getElementById('fi-ht'); if(a) a.textContent=eur(ht);
  const b=document.getElementById('fi-tva'); if(b) b.textContent=eur(tva);
  const c=document.getElementById('fi-ttc'); if(c) c.textContent=eur(ttc);
}

async function saveDeal(id){
  const btn=document.getElementById('btn-save-deal');
  btn.disabled=true; btn.textContent='Enregistrement…';
  const g=sel=>document.getElementById(sel)?.value;
  const payload={
    etape:     g('f-etape')||null,
    statut:    g('f-statut')||null,
    titre:     document.getElementById('so-titre')?.value.trim()||null,
    valeur:    g('f-valeur')!==''?parseFloat(g('f-valeur')):null,
    probabilite:g('f-proba')!==''?parseInt(g('f-proba')):null,
    date_closing_prevu:g('f-closing')||null,
    date_gain: g('f-gain')||null,
    notes:     document.getElementById('f-notes')?.value.trim()||null,
    updated_at:new Date().toISOString(),
  };
  const {error}=await sb.from('deals').update(payload).eq('id',id);
  if(error){toast('Erreur : '+error.message,'error');btn.disabled=false;btn.textContent='Enregistrer les modifications';return;}
  const idx=allDeals.findIndex(d=>d.id===id);
  if(idx!==-1) allDeals[idx]={...allDeals[idx],...payload};
  refreshMeta(); renderKanban(); renderListe();
  document.getElementById('so-meta').innerHTML=buildMeta({...(allDeals[idx]||{}),...payload});
  toast('Deal enregistré ✓');
  closeSlideOver();
}

function buildActs(acts){
  if(!acts.length) return '<div class="so-empty">Aucune activité pour ce deal.</div>';
  const today=new Date().toISOString().split('T')[0];
  const PILL={appel:'p-appel',rdv:'p-rdv',email:'p-email',tache:'p-tache'};
  const PLBL={appel:'📞 Appel',rdv:'🤝 RDV',email:'✉️ Email',tache:'✅ Tâche',autre:'Autre'};
  return acts.map(a=>{
    const late=!a.faite&&a.date_echeance&&a.date_echeance<today;
    return '<div class="act-item'+(a.faite?' act-done':'')+(late?' act-late':'')+'"><span class="act-pill '+(PILL[a.type]||'p-autre')+'">'+(PLBL[a.type]||a.type||'?')+'</span><div class="act-info"><div class="act-sujet">'+esc(a.sujet||'(sans sujet)')+'</div><div class="act-date">'+(a.date_echeance?fd(a.date_echeance):'—')+(a.heure_echeance?' · '+a.heure_echeance.slice(0,5):'')+(a.faite?' · Fait':'')+'</div></div></div>';
  }).join('');
}

function buildNotes(notes,dealId){
  const list=notes.length
    ?notes.map(n=>'<div class="note-item"><div class="note-d">'+fdt(n.created_at)+'</div><div class="note-c">'+esc(n.contenu||'')+'</div></div>').join('')
    :'<div class="so-empty">Aucune note.</div>';
  return '<div class="note-form"><textarea class="note-ta" id="note-ta-'+dealId+'" placeholder="Nouvelle note…"></textarea>'
    +'<button class="btn-note" id="btn-note">+ Ajouter</button></div>'
    +'<div id="notes-list">'+list+'</div>';
}

async function addNote(dealId){
  const ta=document.getElementById('note-ta-'+dealId);
  const contenu=ta?.value.trim(); if(!contenu){toast('Note vide','error');return;}
  const {error}=await sb.from('notes').insert([{contenu,deal_id:dealId}]);
  if(error){toast('Erreur : '+error.message,'error');return;}
  ta.value=''; toast('Note ajoutée ✓');
  const {data:notes}=await sb.from('notes').select('*').eq('deal_id',dealId).order('created_at',{ascending:false});
  if(notes){
    document.getElementById('notes-list').innerHTML=notes.map(n=>'<div class="note-item"><div class="note-d">'+fdt(n.created_at)+'</div><div class="note-c">'+esc(n.contenu||'')+'</div></div>').join('');
    const cnt=document.getElementById('cnt-notes'); if(cnt) cnt.textContent=notes.length||'';
  }
}

function switchTab(t){
  ['act','notes'].forEach(x=>{
    document.getElementById('tab-'+x)?.classList.toggle('active',x===t);
    document.getElementById('panel-'+x)?.classList.toggle('active',x===t);
  });
}

function markActive(dealId){
  document.querySelectorAll('.kcard').forEach(c=>c.classList.toggle('active-so',c.dataset.id===dealId));
  const deals=filtreEtape?allDeals.filter(d=>d.etape===filtreEtape):allDeals;
  document.querySelectorAll('#deals-body tr').forEach((tr,i)=>tr.classList.toggle('active-so',deals[i]?.id===dealId));
}

function closeSlideOver(){
  document.getElementById('so-overlay').classList.remove('open');
  document.getElementById('slideover').classList.remove('open');
  currentSoId=null;
  document.querySelectorAll('.kcard').forEach(c=>c.classList.remove('active-so'));
  document.querySelectorAll('#deals-body tr').forEach(tr=>tr.classList.remove('active-so'));
}

// Helpers
function eur(n){return(isNaN(n)?0:n).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fd(d){if(!d)return'—';const dt=new Date(d+'T00:00:00');return isNaN(dt.getTime())?'—':dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function fdt(iso){if(!iso)return'';const dt=new Date(iso);return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function vHtml(v){if(v==null||v==='')return'<span class="tv z">—</span>';const n=parseFloat(v);return isNaN(n)?'<span class="tv z">—</span>':'<span class="tv">'+eur(n)+'</span>';}
function dHtml(d,today,in30){if(!d)return'<span class="td2">—</span>';const dt=new Date(d);if(isNaN(dt.getTime()))return'<span class="td2">—</span>';const soon=dt>=today&&dt<=in30;return'<span class="td2'+(soon?' soon':'')+'">'+dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})+'</span>';}

loadDeals();
</script>
